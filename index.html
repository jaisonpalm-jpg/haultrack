<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800;900&family=Barlow:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#eef5f4;--bg2:#dff2ee;--card:#fff;--card2:#f8fbfb;--text:#071426;--muted:#5b6878;--line:#d5e1e2;--green:#119553;--green2:#d8f4e5;--blue:#1a83a8;--blue2:#dff5ff;--amber:#bf7b13;--amber2:#fff0d9;--red:#c43b4a;--red2:#ffe1e5;--shadow:0 16px 40px rgba(9,24,39,.10);--soft:0 8px 22px rgba(9,24,39,.08);--radius:20px;--sidebar:252px}
[data-theme=dark]{--bg:#06111b;--bg2:#08251f;--card:#101d2a;--card2:#142435;--text:#f2f7fb;--muted:#9aabba;--line:#233449;--green:#22c875;--green2:#123d2a;--blue:#37a5c7;--blue2:#103244;--amber:#f2a733;--amber2:#3e2a0e;--red:#ef6673;--red2:#431922;--shadow:0 18px 45px rgba(0,0,0,.28);--soft:0 10px 26px rgba(0,0,0,.22)}
*{box-sizing:border-box}body{margin:0;font-family:Barlow,system-ui,sans-serif;color:var(--text);background:radial-gradient(circle at 70% 0%,var(--bg2),transparent 36rem),linear-gradient(135deg,var(--bg),#f7fafc);min-height:100vh;overflow-x:hidden}button,input{font-family:inherit}.app{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
aside{position:sticky;top:0;height:100vh;padding:24px 18px;border-right:1px solid var(--line);background:rgba(255,255,255,.55);backdrop-filter:blur(16px)}[data-theme=dark] aside{background:rgba(7,18,29,.72)}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}.logo{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#0a844a,#f28722);box-shadow:var(--soft);display:grid;place-items:center;color:#fff;font:900 24px "Barlow Condensed";letter-spacing:-1px}.brand h1{font:900 28px/24px "Barlow Condensed";margin:0}.brand span{display:block;font:700 11px Barlow;letter-spacing:3px;color:var(--green)}
nav{display:grid;gap:8px}.nav-item{border:0;background:transparent;color:var(--muted);display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;text-align:left}.nav-item.active,.nav-item:hover{background:var(--green2);color:var(--green)}
.side-card{margin-top:28px;padding:16px;border:1px solid var(--line);border-radius:20px;background:var(--card);box-shadow:var(--soft)}.side-card small{display:block;color:var(--muted);font-weight:800;letter-spacing:1px;text-transform:uppercase}.side-card strong{font-size:24px;color:var(--green)}
main{padding:22px 28px 40px;min-width:0}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;margin-bottom:22px;padding:14px 18px;border:1px solid var(--line);background:rgba(255,255,255,.62);backdrop-filter:blur(14px);border-radius:24px;box-shadow:var(--soft)}[data-theme=dark] .topbar{background:rgba(16,29,42,.72)}
.route strong{color:var(--green);font-size:20px}.route div{font-weight:800}.route span{color:var(--muted);font-weight:700;font-size:13px;letter-spacing:1px}.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill,.btn,.chip{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:10px 14px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;box-shadow:0 2px 0 rgba(0,0,0,.04);display:inline-flex;align-items:center;gap:6px}.pill.green,.chip.green{background:var(--green2);color:var(--green);border-color:rgba(17,149,83,.25)}.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}.btn.ghost{background:transparent}.chip{font-size:12px;padding:6px 10px}.chip.amber{background:var(--amber2);color:var(--amber);border-color:rgba(191,123,19,.25)}.chip.red{background:var(--red2);color:var(--red);border-color:rgba(196,59,74,.25)}.chip.blue{background:var(--blue2);color:var(--blue);border-color:rgba(26,131,168,.25)}
.page-head{display:flex;align-items:end;justify-content:space-between;margin:12px 2px 20px}.eyebrow{color:var(--muted);font:900 13px Barlow;letter-spacing:2.2px;text-transform:uppercase}h2{font:900 46px/44px "Barlow Condensed";letter-spacing:-.8px;margin:5px 0 0}h3{font:900 36px/34px "Barlow Condensed";margin:0}
.layout-two{display:grid;grid-template-columns:minmax(0,1.7fr) 380px;gap:22px;align-items:start}.grid{display:grid;gap:16px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.five{grid-template-columns:repeat(5,minmax(0,1fr))}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;overflow:hidden}.kpi small,.section-title small,.mini small{display:block;font:900 12px Barlow;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase}.kpi strong{display:block;font:900 38px/36px "Barlow Condensed";margin-top:5px}.kpi em{font-style:normal;color:var(--green);font-weight:800;font-size:13px}.section-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:12px}
.pipeline{display:grid;grid-template-columns:repeat(2,1fr);border:1px solid var(--line);border-radius:18px;overflow:hidden}.pipe{padding:16px;border-bottom:1px solid var(--line)}.pipe:nth-child(odd){border-right:1px solid var(--line)}.pipe:nth-child(3),.pipe:nth-child(4){border-bottom:0}.pipe-row{display:flex;justify-content:space-between;align-items:end;margin-top:10px}.pipe-row b{font:900 28px "Barlow Condensed"}.pipe-row span{color:var(--green);font-weight:900}
.load-title{display:flex;justify-content:space-between;align-items:center;gap:12px}.load-title h3{font:900 42px/40px "Barlow Condensed";margin:14px 0 6px}.metric-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:16px 0}.mini{padding:14px;border:1px solid var(--line);border-radius:18px;text-align:center;background:rgba(255,255,255,.32)}.mini b{display:block;font:900 25px "Barlow Condensed"}.bar{height:9px;background:rgba(90,110,130,.18);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;width:92%;background:var(--green)}
table{width:100%;border-collapse:collapse}th{text-align:left;color:var(--muted);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;padding:12px}td{padding:14px 12px;border-top:1px solid var(--line);font-weight:700;vertical-align:top}tr:hover td{background:rgba(17,149,83,.035)}td.money{color:var(--green);text-align:right;font-weight:900}.list{display:grid;gap:10px}.item{display:flex;justify-content:space-between;gap:12px;padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.3)}.item b{display:block}.item small,.muted{color:var(--muted);font-weight:700}
.chart{height:210px;position:relative;background:linear-gradient(180deg,rgba(17,149,83,.08),transparent);border-radius:18px;border:1px dashed var(--line)}.chart svg{position:absolute;inset:0;width:100%;height:100%}.right-panel{position:sticky;top:22px}.avatar{width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:900}.input{width:100%;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:16px;padding:12px 14px;font-weight:700;outline:none}.drawer{border-left:1px solid var(--line);background:linear-gradient(180deg,var(--card),var(--card2));border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.upload{border:2px dashed var(--line);border-radius:20px;padding:32px;text-align:center;background:rgba(255,255,255,.28)}
@media(max-width:1100px){:root{--sidebar:86px}.brand h1,.nav-item span,.side-card{display:none}aside{padding:20px 12px}.logo{margin:auto}.nav-item{justify-content:center}.layout-two{grid-template-columns:1fr}.right-panel{position:static}.four,.five{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body data-theme="light">
<div class="app">
<aside><div class="brand"><div class="logo">FD</div><div><h1>FreightDesk</h1><span>PRO</span></div></div><nav id="nav"></nav><div class="side-card"><small>Week Gross</small><strong id="sideWeekGross">$0</strong><small id="sideLoadCount">0 loads tracked</small></div></aside>
<main>
<div class="topbar"><div class="route" id="topRoute"></div><div class="actions"><span class="pill green" id="topRpm">$0 RPM</span><span class="pill green">● Online</span><button class="btn ghost" onclick="toggleTheme()">Toggle Theme</button><button class="btn primary" onclick="go('loads')">+ New Load</button><div class="avatar">JA</div></div></div>
<div id="pageHead" class="page-head"></div><section id="mainPage"></section>
</main>
</div>
<script>
const state={page:"home",selectedLoadId:"36493794",pages:[["home","Home","⌂"],["loads","Loads","▣"],["finance","Finance","$"],["fuel","Fuel","⛽"],["documents","Documents","▤"],["analytics","Analytics","◷"],["settings","Settings","⚙"]],user:{name:"Jaison",role:"Administrator"},loads:[{id:"36493794",date:"Apr 29",status:"At Delivery",origin:"Syracuse, IN",destination:"Charlotte, NC",rate:1200,miles:646,driver:"Jaison",broker:"RXO",commodity:"Auto Parts",payment:"Needs Invoice"},{id:"41330",date:"Apr 28",status:"Delivered",origin:"Brownstown, AL",destination:"Lima, OH",rate:1000,miles:543,driver:"Jaison",broker:"Coyote",commodity:"General Freight",payment:"Paid"},{id:"0681674",date:"Apr 27",status:"Delivered",origin:"West Grove, PA",destination:"Anniston, AL",rate:1400,miles:783,driver:"Jaison",broker:"CH Robinson",commodity:"Machinery",payment:"Quick Pay Submitted"},{id:"81616",date:"Apr 24",status:"Paid",origin:"Ramseur, NC",destination:"Delmar, DE",rate:700,miles:391,driver:"Jaison",broker:"Echo",commodity:"Retail",payment:"Paid"},{id:"425170",date:"Apr 27",status:"Delivered",origin:"Atlanta, GA",destination:"Columbus, OH",rate:950,miles:560,driver:"Driver 1",broker:"Uber Freight",commodity:"Food",payment:"Needs Invoice"}],fuel:[{date:"Apr 28",load:"41330",gallons:56.09,ppg:4.837,total:271.31},{date:"Apr 27",load:"0681674",gallons:42.8,ppg:4.21,total:180.19},{date:"Apr 24",load:"81616",gallons:30.1,ppg:4.02,total:121}],docs:[{name:"POD missing for 425170",status:"Invoicing blocked until upload",type:"POD",date:"Apr 27"},{name:"Rate Con — 36493794",status:"Ready for processing",type:"Rate Confirmation",date:"Today"},{name:"Invoice packet — 0681674",status:"Quick Pay submitted",type:"Invoice",date:"Apr 27"}],activity:[{title:"Tolls · 36493794",sub:"WV Toll",amount:"$7.00"},{title:"Fuel · 41330",sub:"56.090 gallons",amount:"$271.31"},{title:"Load 36493794",sub:"At Delivery",amount:"$1,200"}]};
const $=id=>document.getElementById(id),money=n=>"$"+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0}),fmt=n=>Number(n||0).toLocaleString(),gross=()=>state.loads.reduce((s,l)=>s+Number(l.rate||0),0),fuelTotal=()=>state.fuel.reduce((s,f)=>s+Number(f.total||0),0),net=()=>gross()-fuelTotal(),currentLoad=()=>state.loads.find(l=>l.id===state.selectedLoadId)||state.loads[0];
function init(){renderNav();render()}function renderNav(){$("nav").innerHTML=state.pages.map(p=>`<button class="nav-item ${state.page===p[0]?"active":""}" onclick="go('${p[0]}')">${p[2]} <span>${p[1]}</span></button>`).join("")}function go(page){state.page=page;renderNav();render()}
function render(){renderTopbar();renderPageHead();if(state.page==="home")renderHome();if(state.page==="loads")renderLoads();if(state.page==="finance")renderFinance();if(state.page==="fuel")renderFuel();if(state.page==="documents")renderDocs();if(state.page==="analytics")renderAnalytics();if(state.page==="settings")renderSettings();$("sideWeekGross").textContent=money(gross());$("sideLoadCount").textContent=state.loads.length+" loads tracked"}
function renderTopbar(){const l=currentLoad(),rpm=l.miles?(l.rate/l.miles).toFixed(2):"0.00";$("topRoute").innerHTML=`<div><strong>${l.id}</strong> · ${l.origin.split(",")[0]} → ${l.destination.split(",")[0]}</div><span>${l.status.toUpperCase()} · ${l.broker}</span>`;$("topRpm").textContent="$"+rpm+" RPM"}
function renderPageHead(){const titles={home:["Desktop Operations Command","Good morning, "+state.user.name],loads:["Load Workspace","Loads"],finance:["Money Command Center","Finance"],fuel:["Cost Control","Fuel"],documents:["Document Intelligence","Documents"],analytics:["Performance Intelligence","Analytics"],settings:["Company Controls","Settings"]},t=titles[state.page];$("pageHead").innerHTML=`<div><div class="eyebrow">${t[0]}</div><h2>${t[1]}</h2></div><span class="pill green">${state.user.role}</span>`}
function pipeHtml(){const c={};["Needs Invoice","Awaiting Payment","Quick Pay Submitted","Paid"].forEach(k=>c[k]=state.loads.filter(l=>l.payment===k));return [["Needs Invoice","amber","SEND INVOICE"],["Awaiting Payment","red","WAITING ON BROKER"],["Quick Pay Submitted","blue","QUICK PAY PENDING"],["Paid","green","PAYMENT RECEIVED"]].map(x=>{const rows=c[x[0]],total=rows.reduce((s,l)=>s+l.rate,0);return`<div class="pipe"><span class="chip ${x[1]}">${x[0]}</span><div class="pipe-row"><b>${rows.length}</b><span>${money(total)}</span></div><small>${x[2]}</small></div>`}).join("")}
function loadRow(l){const cls=l.status==="Paid"||l.status==="Delivered"?"green":l.status==="At Delivery"?"amber":"blue";return`<tr onclick="selectLoad('${l.id}')"><td>${l.date}</td><td>${l.id}</td><td><span class="chip ${cls}">${l.status}</span></td><td>${l.origin} → ${l.destination}</td><td>${l.driver||"—"}</td><td class="money">${money(l.rate)}</td></tr>`}
function renderHome(){const l=currentLoad(),todayNet=l.rate-187;$("mainPage").innerHTML=`<section class="layout-two"><div class="grid"><div class="grid four">${[["Today Net",money(todayNet),"1 load delivered"],["Today Gross",money(l.rate),"Fuel $0 · Other $21"],["Open Loads","1","0 booked · 1 active"],["Avg RPM","$"+(l.rate/l.miles).toFixed(2),"Across saved loads"]].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><em>${k[2]}</em></div>`).join("")}</div><div class="grid two"><div class="card"><div class="section-title"><small>Payment Pipeline</small><small>Across Your Loads</small></div><div class="pipeline">${pipeHtml()}</div></div><div class="card"><div class="section-title"><small>Quick Actions</small><small>Financial + Dispatch</small></div><div class="grid two"><button class="btn" onclick="go('fuel')">Fuel</button><button class="btn" onclick="go('finance')">Expense</button><button class="btn" onclick="go('finance')">Invoice</button><button class="btn" onclick="go('documents')">Upload Docs</button></div></div></div><div class="card"><div class="load-title"><div><small class="eyebrow">Active Load</small><h3>${l.origin.split(",")[0]} → ${l.destination.split(",")[0]}</h3><p class="muted" style="margin:0">${l.id} · 26 ft Straight Box Truck · ETA 6:00 AM</p></div><span class="pill green">${l.status} ›</span></div><div class="metric-row"><div class="mini"><b>${money(l.rate)}</b><small>Rate</small></div><div class="mini"><b style="color:var(--green)">$${(l.rate/l.miles).toFixed(2)}</b><small>RPM</small></div><div class="mini"><b>${money(todayNet)}</b><small>Est Profit</small></div></div><div class="bar"><span></span></div><p class="muted" style="display:flex;justify-content:space-between"><span>ETA 6:00 AM · 0 mi remaining</span><span>Fuel —</span></p></div><div class="card"><div class="section-title"><small>Loads Workspace</small><small>Desktop split view ready</small></div><table><thead><tr><th>Date</th><th>Load</th><th>Status</th><th>Lane</th><th>Driver</th><th style="text-align:right">Gross</th></tr></thead><tbody>${state.loads.slice(0,4).map(loadRow).join("")}</tbody></table></div></div><div class="right-panel grid"><div class="card"><div class="section-title"><small>Finance Snapshot</small><small>Last 12 Months</small></div><div class="chart"><svg viewBox="0 0 400 210" preserveAspectRatio="none"><path d="M20 170 L80 170 L140 170 L200 168 L250 160 L295 120 L340 70 L380 25" fill="none" stroke="currentColor" stroke-width="4" style="color:var(--green)"/></svg></div></div><div class="card"><div class="section-title"><small>Needs Attention</small><small>Money Leaks</small></div><div class="list">${state.docs.filter(d=>d.status.includes("blocked")).map(d=>`<div class="item"><div><b>${d.name}</b><small>${d.status}</small></div><small>${d.date} ›</small></div>`).join("")}</div></div><div class="card"><div class="section-title"><small>Recent Activity</small><small>Today</small></div><div class="list">${state.activity.map(a=>`<div class="item"><div><b>${a.title}</b><small>${a.sub}</small></div><b>${a.amount}</b></div>`).join("")}</div></div></div></section>`}
function selectLoad(id){state.selectedLoadId=id;if(state.page!=="loads")go("loads");else renderLoads()}
function renderLoads(){const l=currentLoad();$("mainPage").innerHTML=`<section class="layout-two"><div class="card"><div class="section-title"><small>Loads</small><small>Manage & Dispatch</small></div><div style="margin-bottom:14px;display:flex;gap:10px"><input class="input" placeholder="Search loads, broker, lane..." oninput="filterLoads(this.value)"><button class="btn primary" onclick="alert('Next step: add inline load form + Firebase save.')">+ Add Load</button></div><table><thead><tr><th>Date</th><th>Load</th><th>Status</th><th>Lane</th><th>Driver</th><th style="text-align:right">Gross</th></tr></thead><tbody id="loadsTable">${state.loads.map(loadRow).join("")}</tbody></table></div><aside class="drawer"><div class="section-title"><small>Selected Load</small><small>${l.status}</small></div><h3>${l.origin.split(",")[0]} → ${l.destination.split(",")[0]}</h3><p class="muted">${l.id} · ${l.broker}</p><div class="metric-row"><div class="mini"><b>${money(l.rate)}</b><small>Rate</small></div><div class="mini"><b style="color:var(--green)">$${(l.rate/l.miles).toFixed(2)}</b><small>RPM</small></div><div class="mini"><b>${fmt(l.miles)}</b><small>Miles</small></div></div><div class="list"><div class="item"><div><b>Driver</b><small>${l.driver}</small></div></div><div class="item"><div><b>Commodity</b><small>${l.commodity}</small></div></div><div class="item"><div><b>Payment</b><small>${l.payment}</small></div></div></div></aside></section>`}
function filterLoads(q){q=(q||"").toLowerCase();$("loadsTable").innerHTML=state.loads.filter(l=>JSON.stringify(l).toLowerCase().includes(q)).map(loadRow).join("")}
function renderFinance(){ $("mainPage").innerHTML=`<section class="grid"><div class="grid four">${[["Gross Revenue",money(gross()),"All tracked loads"],["Net Revenue",money(net()),"Gross minus fuel"],["Fuel Spend",money(fuelTotal()),"Logged fuel"],["Avg RPM","$"+(gross()/state.loads.reduce((s,l)=>s+l.miles,0)).toFixed(2),"All miles"]].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><em>${k[2]}</em></div>`).join("")}</div><div class="grid two"><div class="card"><div class="section-title"><small>Payment Pipeline</small><small>Receivables</small></div><div class="pipeline">${pipeHtml()}</div></div><div class="card"><div class="section-title"><small>Expense Snapshot</small><small>Fuel + Operating</small></div><div class="chart"></div></div></div><div class="card"><div class="section-title"><small>Recent Financial Activity</small><small>Expenses + Revenue</small></div><div class="list">${state.activity.map(a=>`<div class="item"><div><b>${a.title}</b><small>${a.sub}</small></div><b>${a.amount}</b></div>`).join("")}</div></div></section>`}
function renderFuel(){const gallons=state.fuel.reduce((s,f)=>s+f.gallons,0);$("mainPage").innerHTML=`<section class="grid"><div class="grid four">${[["Fuel Spend",money(fuelTotal()),"Total logged"],["Gallons",gallons.toFixed(1),"Purchased"],["Avg $/Gal","$"+(fuelTotal()/gallons).toFixed(2),"Average price"],["Fuel Entries",state.fuel.length,"This period"]].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><em>${k[2]}</em></div>`).join("")}</div><div class="card"><div class="section-title"><small>Fuel Log</small><small>Cost Control</small></div><table><thead><tr><th>Date</th><th>Load</th><th>Gallons</th><th>$/Gal</th><th style="text-align:right">Total</th></tr></thead><tbody>${state.fuel.map(f=>`<tr><td>${f.date}</td><td>${f.load}</td><td>${f.gallons}</td><td>$${f.ppg}</td><td class="money">${money(f.total)}</td></tr>`).join("")}</tbody></table></div></section>`}
function renderDocs(){ $("mainPage").innerHTML=`<section class="layout-two"><div class="grid"><div class="card"><div class="section-title"><small>Documents</small><small>Rate Cons / PODs / Invoices</small></div><div class="upload"><h3>Drop documents here</h3><p class="muted">Rate confirmations, BOLs, PODs, invoices, receipts</p><input type="file" multiple></div></div><div class="card"><div class="section-title"><small>Document Queue</small><small>Processing</small></div><div class="list">${state.docs.map(d=>`<div class="item"><div><b>${d.name}</b><small>${d.type} · ${d.status}</small></div><small>${d.date} ›</small></div>`).join("")}</div></div></div><aside class="drawer"><div class="section-title"><small>Auto Build</small><small>Next Feature</small></div><h3>Rate Con → Load</h3><p class="muted">Reserved for OCR extraction, rate confirmation review, and one-click load creation.</p><button class="btn primary">Process Rate Con</button></aside></section>`}
function renderAnalytics(){ $("mainPage").innerHTML=`<section class="grid"><div class="grid four">${[["Gross",money(gross()),"Company total"],["Net",money(net()),"After fuel"],["Loads",state.loads.length,"Tracked"],["Avg Load",money(gross()/state.loads.length),"Per load"]].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><em>${k[2]}</em></div>`).join("")}</div><div class="grid two"><div class="card"><div class="section-title"><small>Dispatcher Report Card</small><small>Team Performance</small></div><div class="list">${["Load Accuracy 96%","Avg Response 12 min","Invoice Ready 88%"].map(x=>`<div class="item"><div><b>${x}</b><small>Dispatcher performance metric</small></div><span class="chip green">Good</span></div>`).join("")}</div></div><div class="card"><div class="section-title"><small>Driver Report Card</small><small>Safety + Profitability</small></div><div class="list">${["On-Time 94%","RPM $1.99","Docs Returned 82%"].map(x=>`<div class="item"><div><b>${x}</b><small>Driver performance metric</small></div><span class="chip green">Good</span></div>`).join("")}</div></div></div></section>`}
function renderSettings(){ $("mainPage").innerHTML=`<section class="grid two"><div class="card"><div class="section-title"><small>Settings</small><small>Company</small></div><label class="muted">Company Name</label><input class="input" value="Speedy Sparrow Logistics LLC"><br><br><label class="muted">Default Factoring Fee</label><input class="input" value="3%"></div><div class="card"><div class="section-title"><small>Appearance</small><small>Theme</small></div><p class="muted">Operator-style design system is active. Use the theme toggle to preview dark mode.</p><button class="btn primary" onclick="toggleTheme()">Toggle Theme</button></div></section>`}
function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==="dark"?"light":"dark"}init();
</script>
