const state={page:'home',selectedLoadId:'36493794',selectedDocId:null,sync:'Local mode',companyId:localStorage.getItem('fdp_company_id')||'co_demo_freightdesk_pro',user:{uid:'user-admin',name:'Jaison',role:'Admin'},pages:[['home','Home','⌂'],['loads','Loads','▣'],['documents','Documents','▤'],['finance','Finance','$'],['analytics','Analytics','◷'],['settings','Settings','⚙']],loads:seedLoads,docs:[{id:'doc-ratecon-36493794',name:'Rate Con — 36493794',type:'Rate Confirmation',status:'Extraction ready',date:'Today',loadId:'36493794',pipeline:{ocr:'done',parse:'done',validate:'done',review:'active'},score:86,extracted:{loadNumber:'36493794',origin:'Syracuse, IN',destination:'Charlotte, NC',rate:1200,miles:646,broker:'RXO',commodity:'Auto Parts',equipment:'26 ft Box Truck',confidence:{loadNumber:90,origin:85,destination:85,rate:90,broker:80}},audit:[{time:'Now',msg:'Seed extraction ready.',type:'info'}]}],fuel:[],expenses:[]};

function go(p){state.page=p;if(p==='analytics'){render();return}render()}function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark'}function clsStatus(s){return ['Paid','Delivered'].includes(s)?'green':s==='At Delivery'?'amber':s==='Cancelled'?'red':'blue'}function rpm(l){return Number(l.miles)?(Number(l.rate)/Number(l.miles)).toFixed(2):'0.00'}

estination:l.destination,rate:l.rate,miles:l.miles,broker:l.broker,commodity:l.commodity,equipment:'26 ft Box Truck',confidence:{loadNumber:num?85:45,origin:50,destination:50,rate:50,broker:50}}}async function file64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(f)})}async function extractGroq(file){const key=getOcrSettings().groqKey;if(!key)return null;const b64=await file64(file);const body={model:'meta-llama/llama-4-scout-17b-16e-instruct',messages:[{role:'user',content:[{type:'text',text:'Extract rate confirmation fields as JSON only: loadNumber, origin, destination, pickupDate, deliveryDate, rate, miles, broker, commodity, weight, equipment, confidence.'},{type:'image_url',image_url:{url:`data:${file.type||'image/jpeg'};base64,${b64}`}}]}],temperature:0};const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{Authorization:'Bearer '+key,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error('Groq '+r.status);const d=await r.json();return JSON.parse((d.choices?.[0]?.message?.content||'{}').replace(/```json|```/g,'').trim())}

async function handleFiles(files){for(const file of Array.from(files||[])){const type=/rate|rc|confirmation/i.test(file.name)?'Rate Confirmation':/pod|bol|delivery/i.test(file.name)?'POD':'Document';const doc={id:'doc-'+Date.now()+'-'+Math.random().toString(16).slice(2),name:file.name,type,status:type==='Rate Confirmation'?'Queued':'Uploaded',date:new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit'}),pipeline:{ocr:'pending',parse:'pending',validate:'pending',review:'pending'},audit:[]};state.docs.unshift(doc);state.selectedDocId=doc.id;persist();if(type==='Rate Confirmation')await runExtraction(file,doc)}renderDocs()}function selectedDoc(){return state.docs.find(d=>d.id===state.selectedDocId)||state.docs[0]}function selectDoc(id){state.selectedDocId=id;renderDocs()}function updateExtract(k,v){const d=selectedDoc();d.extracted=d.extracted||{};d.extracted[k]=['rate','miles'].includes(k)?Number(v||0):v;d.score=score(d);persist()}function approveDoc(){const d=selectedDoc();if(checks(d.extracted||{}).some(c=>!c.pass&&c.severity==='fail'))return alert('Fix required fields first.');d.status='Approved';setPipe(d,'review','done');audit(d,'Approved');persist();renderDocs()}function createLoadFromDoc(){const d=selectedDoc(),x=d?.extracted||{};if(checks(x).some(c=>!c.pass&&c.severity==='fail'))return alert('Fix required fields first.');const l={id:x.loadNumber,date:new Date().toLocaleDateString('en-US',{month:'short',day:'2-digit'}),status:'Booked',origin:x.origin,destination:x.destination,rate:Number(x.rate||0),miles:Number(x.miles||0),broker:x.broker,driver:'',commodity:x.commodity,payment:'Needs Invoice'};const i=state.loads.findIndex(a=>a.id===l.id);if(i>=0)state.loads[i]=l;else state.loads.unshift(l);d.status='Load created';d.loadId=l.id;state.selectedLoadId=l.id;persist();go('loads')}
function pipeHtml(d){const p=d.pipeline||{};return `<div class="pipeline-steps">${[['ocr','OCR'],['parse','Parse'],['validate','Validate'],['review','Review']].map(s=>`<div class="pipeline-step ${p[s[0]]||'pending'}"><b>${s[1]}</b><small>${(p[s[0]]||'pending').toUpperCase()}</small></div>`).join('')}</div>`}function extractionHtml(d){const x=d.extracted||{},fields=[['loadNumber','Load #'],['origin','Origin'],['destination','Destination'],['pickupDate','Pickup'],['deliveryDate','Delivery'],['rate','Rate'],['miles','Miles'],['broker','Broker'],['commodity','Commodity'],['weight','Weight'],['equipment','Equipment']];return `<div class="extract-panel">${fields.map(f=>`<div class="extract-field"><label class="form-label">${f[1]}</label><input class="input" value="${x[f[0]]??''}" onchange="updateExtract('${f[0]}',this.value)"><span class="conf ${conf(x.confidence?.[f[0]])}">${x.confidence?.[f[0]]||'manual'}%</span></div>`).join('')}</div>`}function validateHtml(d){return `<div class="validation-list">${checks(d.extracted||{}).map(c=>`<div class="validation-item ${c.severity}"><b>${c.name}</b><small>${c.pass?'PASS':c.msg}</small></div>`).join('')}</div>`}function auditHtml(d){return `<div class="audit-log">${(d.audit||[]).map(a=>`<div>${a.time} · ${a.msg}</div>`).join('')||'<div>No audit yet.</div>'}</div>`}

function analyticsCosts(loadId){
  const fuel=(state.fuel||[]).filter(f=>String(f.load)===String(loadId)).reduce((s,f)=>s+Number(f.total||0),0);
  const expenses=(state.expenses||[]).filter(e=>String(e.load)===String(loadId)).reduce((s,e)=>s+Number(e.amount||0),0);

}
function analyticsInvoiceStatus(l){return typeof invoiceStatus==="function"?invoiceStatus(l):(l.invoiceStatus||l.payment||"Needs Invoice")}
function analyticsProfit(l){
  if(typeof loadProfitFull==="function")return loadProfitFull(l);

  const fees=Number(l.invoiceFees||0)+Number(l.rate||0)*(Number(l.factoringPct??3)/100)+Number(l.rate||0)*(Number(l.quickPayPct??0)/100);

function analyticsDocStatus(loadId){

function analyticsSnapshot(){
  const loads=state.loads||[];
  const fuel=state.fuel||[];
  const expenses=state.expenses||[];
  const docs=state.docs||[];
  const gross=loads.reduce((s,l)=>s+Number(l.rate||0),0);
  const miles=loads.reduce((s,l)=>s+Number(l.miles||0),0);
  const fuelCost=fuel.reduce((s,f)=>s+Number(f.total||0),0);
  const expenseCost=expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const profit=loads.reduce((s,l)=>s+analyticsProfit(l),0);
  const delivered=loads.filter(l=>["Delivered","Paid"].includes(l.status));
  const active=loads.filter(l=>!["Delivered","Paid","Cancelled"].includes(l.status));
  const paid=loads.filter(l=>analyticsInvoiceStatus(l)==="Paid");
  const needsInvoice=loads.filter(l=>analyticsInvoiceStatus(l)==="Needs Invoice");
  const awaiting=loads.filter(l=>analyticsInvoiceStatus(l)==="Awaiting Payment"||analyticsInvoiceStatus(l)==="Invoice Sent");
  const quickPay=loads.filter(l=>analyticsInvoiceStatus(l)==="Quick Pay Submitted");
  const docAvg=loads.length?loads.reduce((s,l)=>s+analyticsDocStatus(l.id).score,0)/loads.length:0;
  const avgRate=loads.length?gross/loads.length:0;
  const rpm=miles?gross/miles:0;
  const profitRpm=miles?profit/miles:0;
  const costPerMile=miles?(fuelCost+expenseCost)/miles:0;
  const margin=gross?profit/gross*100:0;
  const invoiceReady=loads.filter(l=>analyticsDocStatus(l.id).hasRate&&analyticsDocStatus(l.id).hasPod).length;
  const ar=loads.filter(l=>analyticsInvoiceStatus(l)!=="Paid").reduce((s,l)=>s+Number(l.rate||0),0);
  return {loads,fuel,expenses,docs,gross,miles,fuelCost,expenseCost,profit,delivered,active,paid,needsInvoice,awaiting,quickPay,docAvg,avgRate,rpm,profitRpm,costPerMile,margin,invoiceReady,ar};
}
function analyticsByDriver(){
  const groups={};
  (state.loads||[]).forEach(l=>{const k=l.driverName||l.driver||"Unassigned";(groups[k]=groups[k]||[]).push(l)});
  return Object.entries(groups).map(([name,loads])=>{
    const gross=loads.reduce((s,l)=>s+Number(l.rate||0),0);
    const miles=loads.reduce((s,l)=>s+Number(l.miles||0),0);
    const profit=loads.reduce((s,l)=>s+analyticsProfit(l),0);
    const docs=loads.length?loads.reduce((s,l)=>s+analyticsDocStatus(l.id).score,0)/loads.length:0;
    const delivered=loads.filter(l=>["Delivered","Paid"].includes(l.status)).length;
    const score=Math.round(Math.min(100,(miles?gross/miles/2.5*30:0)+(docs*.30)+(loads.length?delivered/loads.length*40:0)));
    return {name,loads:loads.length,gross,miles,profit,rpm:miles?gross/miles:0,docs,delivered,score};
  }).sort((a,b)=>b.score-a.score);
}
function analyticsByBroker(){
  const groups={};
  (state.loads||[]).forEach(l=>{const k=l.broker||"Unknown Broker";(groups[k]=groups[k]||[]).push(l)});
  return Object.entries(groups).map(([broker,loads])=>{
    const gross=loads.reduce((s,l)=>s+Number(l.rate||0),0);
    const miles=loads.reduce((s,l)=>s+Number(l.miles||0),0);
    const profit=loads.reduce((s,l)=>s+analyticsProfit(l),0);
    const paid=loads.filter(l=>analyticsInvoiceStatus(l)==="Paid").length;
    return {broker,loads:loads.length,gross,miles,profit,rpm:miles?gross/miles:0,paidRate:loads.length?paid/loads.length*100:0,avg:gross/loads.length};
  }).sort((a,b)=>b.profit-a.profit);
}

        ${analyticsKpi("Revenue / Mile","$"+analyticsNumber(s.rpm,2),"Gross RPM")}
        ${analyticsKpi("Cost / Mile","$"+analyticsNumber(s.costPerMile,2),"Fuel + expenses")}
        ${analyticsKpi("A/R Open",money(s.ar),"Not paid")}
      </div>
    </div>
    <div class="analytics-grid">
      <div class="card trend-card">
        <div class="section-title"><small>Top Lane Profitability</small><small>Best current lanes</small></div>
        ${simpleBars(lanes.slice(0,8),"lane","profit",(v)=>money(v))}
      </div>
      <div class="card">
        <div class="section-title"><small>Business Health</small><small>Scorecard</small></div>
        <div class="list">
          <div class="item"><div><b>Profit Margin</b><small>Target: 25%+</small></div>${analyticsHealth(s.margin,25,15)}</div>
          <div class="item"><div><b>Document Readiness</b><small>Target: 80%+</small></div>${analyticsHealth(s.docAvg,80,60)}</div>
          <div class="item"><div><b>Paid Conversion</b><small>Target: 70%+</small></div>${analyticsHealth(s.loads.length?s.paid.length/s.loads.length*100:0,70,45)}</div>
          <div class="item"><div><b>RPM Health</b><small>Target: $2.00+</small></div><span class="health-pill ${s.rpm>=2?'health-good':s.rpm>=1.6?'health-warn':'health-bad'}">$${analyticsNumber(s.rpm,2)}</span></div>
        </div>
      </div>
    </div>
    <div class="analytics-summary-row">
      <div class="card compact-card"><div class="section-title"><small>Best Driver</small><small>Score</small></div><h3>${drivers[0]?.name||"—"}</h3><p class="muted">${drivers[0]?drivers[0].score+" score · $"+analyticsNumber(drivers[0].rpm,2)+" RPM":"No driver data"}</p></div>
      <div class="card compact-card"><div class="section-title"><small>Best Broker</small><small>Profit</small></div><h3>${brokers[0]?.broker||"—"}</h3><p class="muted">${brokers[0]?money(brokers[0].profit)+" profit":"No broker data"}</p></div>
      <div class="card compact-card"><div class="section-title"><small>Doc Risk</small><small>Missing</small></div><h3>${s.loads.filter(l=>analyticsDocStatus(l.id).score<67).length}</h3><p class="muted">Loads need paperwork attention</p></div>
      <div class="card compact-card"><div class="section-title"><small>Cash Risk</small><small>Open</small></div><h3>${s.needsInvoice.length+s.awaiting.length}</h3><p class="muted">Loads not fully paid</p></div>
    </div>
  </section>`;
}
function renderOperationsAnalytics(s,drivers,brokers,lanes){
  return `<section class="analytics-section">
    <div class="card"><div class="section-title"><small>Operations KPIs</small><small>Dispatch + Delivery</small></div>
      <div class="kpi-grid-6">
        ${analyticsKpi("Total Loads",s.loads.length,"All loads")}
        ${analyticsKpi("Active Loads",s.active.length,"Not complete")}
        ${analyticsKpi("Delivered",s.delivered.length,"Delivered or paid")}
        ${analyticsKpi("Total Miles",analyticsNumber(s.miles),"Loaded miles")}
        ${analyticsKpi("Avg Miles",analyticsNumber(s.loads.length?s.miles/s.loads.length:0),"Per load")}
        ${analyticsKpi("Open Board",s.active.length,"Needs tracking")}
      </div>
    </div>
    <div class="grid two">
      <div class="card"><div class="section-title"><small>Driver Report Cards</small><small>Profit · RPM · Docs</small></div>
        <table class="analytics-table"><thead><tr><th>Driver</th><th>Loads</th><th>RPM</th><th>Profit</th><th>Docs</th><th>Score</th></tr></thead><tbody>
        ${drivers.map(d=>`<tr><td>${d.name}</td><td>${d.loads}</td><td>$${analyticsNumber(d.rpm,2)}</td><td class="money">${money(d.profit)}</td><td>${analyticsNumber(d.docs,0)}%</td><td>${analyticsHealth(d.score,80,60,"")}</td></tr>`).join("")}
        </tbody></table>
      </div>
      <div class="card"><div class="section-title"><small>Broker / Dispatcher Report Cards</small><small>Cash + Margin</small></div>
        <table class="analytics-table"><thead><tr><th>Broker</th><th>Loads</th><th>Avg Load</th><th>RPM</th><th>Profit</th><th>Paid</th></tr></thead><tbody>
        ${brokers.map(b=>`<tr><td>${b.broker}</td><td>${b.loads}</td><td>${money(b.avg)}</td><td>$${analyticsNumber(b.rpm,2)}</td><td class="money">${money(b.profit)}</td><td>${analyticsHealth(b.paidRate,70,45)}</td></tr>`).join("")}
        </tbody></table>
      </div>
    </div>
  </section>`;
}
function renderFinanceAnalytics(s){
  return `<section class="analytics-section">
    <div class="card"><div class="section-title"><small>Finance + Invoice KPIs</small><small>Cashflow</small></div>
      <div class="kpi-grid-6">
        ${analyticsKpi("Gross Revenue",money(s.gross),"All loads")}
        ${analyticsKpi("A/R Open",money(s.ar),"Not paid")}
        ${analyticsKpi("Needs Invoice",s.needsInvoice.length,"Packets open")}
        ${analyticsKpi("Awaiting Payment",s.awaiting.length,"Invoice sent / waiting")}
        ${analyticsKpi("Quick Pay",s.quickPay.length,"Submitted")}
        ${analyticsKpi("Paid Loads",s.paid.length,money(s.paid.reduce((a,l)=>a+Number(l.rate||0),0))+" received")}
      </div>
    </div>
    <div class="card"><div class="section-title"><small>Cost KPIs</small><small>Fuel + Operating Expenses</small></div>
      <div class="kpi-grid-5">
        ${analyticsKpi("Fuel Spend",money(s.fuelCost),(state.fuel||[]).length+" entries")}
        ${analyticsKpi("Other Expenses",money(s.expenseCost),(state.expenses||[]).length+" entries")}
        ${analyticsKpi("Total Costs",money(s.fuelCost+s.expenseCost),"Operating costs")}
        ${analyticsKpi("Fuel % Gross",pct(s.gross?s.fuelCost/s.gross*100:0),"Fuel burden")}
        ${analyticsKpi("Expense % Gross",pct(s.gross?s.expenseCost/s.gross*100:0),"Non-fuel burden")}
      </div>
    </div>
  </section>`;
}
function renderDocumentAnalytics(s){
  return `<section class="analytics-section">
    <div class="card"><div class="section-title"><small>Document + Compliance KPIs</small><small>Rate Cons · PODs · Invoices</small></div>
      <div class="kpi-grid-6">
        ${analyticsKpi("Doc Score",analyticsNumber(s.docAvg,0)+"%","Average by load")}
        ${analyticsKpi("Documents",s.docs.length,"Uploaded")}
        ${analyticsKpi("Rate Cons",(state.docs||[]).filter(d=>d.type==="Rate Confirmation").length,"Captured")}
        ${analyticsKpi("POD/BOL",(state.docs||[]).filter(d=>d.type==="POD"||/pod|bol/i.test(d.name||"")).length,"Captured")}
        ${analyticsKpi("Invoices",(state.docs||[]).filter(d=>d.type==="Invoice"||/invoice/i.test(d.name||"")).length,"Created")}
        ${analyticsKpi("Missing Docs",s.loads.filter(l=>analyticsDocStatus(l.id).score<67).length,"Needs attention")}
      </div>
    </div>
    <div class="card"><div class="section-title"><small>Document Risk by Load</small><small>Sorted by lowest score</small></div>
      <table class="analytics-table"><thead><tr><th>Load</th><th>Lane</th><th>Rate Con</th><th>POD</th><th>Invoice</th><th>Score</th></tr></thead><tbody>
        ${s.loads.map(l=>({l,d:analyticsDocStatus(l.id)})).sort((a,b)=>a.d.score-b.d.score).map(x=>`<tr><td>${x.l.id}</td><td>${x.l.origin} → ${x.l.destination}</td><td>${x.d.hasRate?'✅':'—'}</td><td>${x.d.hasPod?'✅':'—'}</td><td>${x.d.hasInvoice?'✅':'—'}</td><td>${analyticsHealth(x.d.score,80,60)}</td></tr>`).join("")}
      </tbody></table>
    </div>
  </section>`;
}
function renderDeepDiveAnalytics(lanes){
  return `<section class="analytics-section">
    <div class="card"><div class="section-title"><small>Load-Level Deep Dive</small><small>Contained audit table</small></div>
      <div class="analytics-deep-table">
        <table class="analytics-table"><thead><tr><th>Load</th><th>Lane</th><th>Status</th><th>Gross</th><th>Cost</th><th>Profit</th><th>RPM</th><th>Docs</th></tr></thead><tbody>
        ${lanes.map(l=>`<tr><td>${l.load}</td><td>${l.lane}</td><td><span class="chip ${statusClass?statusClass(l.status):'blue'}">${l.status}</span></td><td>${money(l.gross)}</td><td>${money(l.cost)}</td><td class="money" style="color:${l.profit>=0?'var(--green)':'var(--red)'}">${money(l.profit)}</td><td>$${analyticsNumber(l.rpm,2)}</td><td>${analyticsHealth(l.docs,80,60)}</td></tr>`).join("")}
        </tbody></table>
      </div>
    </div>
  </section>`;
}
function renderAnalytics(){
const s=analyticsSnapshot();
const drivers=analyticsByDriver();
const brokers=analyticsByBroker();
const lanes=analyticsByLane();
let body="";
if(analyticsView==="operations") body=renderOperationsAnalytics(s,drivers,brokers,lanes);
else if(analyticsView==="finance") body=renderFinanceAnalytics(s);
else if(analyticsView==="documents") body=renderDocumentAnalytics(s);
else if(analyticsView==="deep") body=renderDeepDiveAnalytics(lanes);
else body=renderExecutiveAnalytics(s,drivers,brokers,lanes);
$("mainPage").innerHTML=`${analyticsTabs()}${body}`;
}function renderSettings(){$('mainPage').innerHTML=`<section class="grid two"><div class="card"><div class="section-title"><small>Company</small><small>Settings</small></div><label class="form-label">Company ID</label><input class="input" value="${state.companyId}" onchange="state.companyId=this.value;localStorage.setItem('fdp_company_id',this.value)"></div><div class="card"><div class="section-title"><small>Production OCR</small><small>Providers</small></div><p class="muted">For production, API keys should move server-side. This prototype stores the Groq key locally.</p><label class="form-label">Groq API Key</label><input class="input" type="password" value="${getOcrSettings().groqKey}" placeholder="gsk_..." onchange="saveOcr('fdp_groq_key',this.value)"><br><br><button class="btn primary" onclick="toggleTheme()">Toggle Theme</button></div></section>`}
render();
</script>
</body>
</html>
