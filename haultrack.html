// ─── Aggregation helpers ──────────────────────────────────────────────────────
function getMonthlyGross(loads) {
  const map = {};
  loads.forEach(l => {
    if (!l.date) return;
    const d = new Date(l.date+"T12:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    if (!map[key]) map[key] = { key, label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`, gross:0, loads:[] };
    map[key].gross += Number(l.rate||0);
    map[key].loads.push(l);
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
}
function getMonthlyNet(loads, fuel) {
  const map = {};
  loads.forEach(l => {
    if (!l.date) return;
    const d = new Date(l.date+"T12:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    if (!map[key]) map[key] = { key, label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`, gross:0, fuelCost:0, loads:[] };
    map[key].gross += Number(l.rate||0);
    map[key].loads.push(l);
  });
  fuel.forEach(f => {
    if (!f.date) return;
    const d = new Date(f.date+"T12:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    if (map[key]) map[key].fuelCost += Number(f.total||0);
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key)).map(m=>({...m, net:m.gross-m.fuelCost}));
}
function getMonthlyFuel(fuel) {
  const map = {};
  fuel.forEach(f => {
    if (!f.date) return;
    const d = new Date(f.date+"T12:00:00");
    const key = `${d.getFullYear()}-${String(d.getMonth()).padStart(2,"0")}`;
    if (!map[key]) map[key] = { key, label:`${MONTHS[d.getMonth()]} ${d.getFullYear()}`, total:0, gallons:0, entries:[] };
    map[key].total   += Number(f.total||0);
    map[key].gallons += Number(f.gallons||0);
    map[key].entries.push(f);
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
}

function exportExcel(loads, fuel, reportType) {
  const wb = XLSX.utils.book_new();
  const totalRev = loads.reduce((s,l)=>s+Number(l.rate||0),0);
  const totalMiles = loads.reduce((s,l)=>s+Number(l.miles||0),0);
  const totalFuel  = fuel.reduce((s,f)=>s+Number(f.total||0),0);
  const totalGal   = fuel.reduce((s,f)=>s+Number(f.gallons||0),0);
  const delivered  = loads.filter(l=>l.status==="Delivered");
  if (reportType==="all"||reportType==="loads") {
    const ws=XLSX.utils.aoa_to_sheet([["LOAD HISTORY REPORT","","","","","","","",""],["Generated:",new Date().toLocaleDateString(),"","","","","","",""],[""],["Load #","Origin","Destination","Miles","Rate ($)","Rate/Mile ($)","Status","Date","Broker","Commodity"],...loads.map(l=>[l.loadNumber,l.origin,l.destination,Number(l.miles),Number(l.rate),Number(l.miles)>0?+(Number(l.rate)/Number(l.miles)).toFixed(2):0,l.status,l.date,l.broker,l.commodity]),[""],["TOTALS","","",`=SUM(D5:D${4+loads.length})`,`=SUM(E5:E${4+loads.length})`,`=IFERROR(E${5+loads.length}/D${5+loads.length},0)`,"","","",""]]);
    ws["!cols"]=[14,18,18,8,10,11,12,12,16,16].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws,"Load History");
  }
  if (reportType==="all"||reportType==="fuel") {
    const ws2=XLSX.utils.aoa_to_sheet([["FUEL EXPENSE REPORT","","","","",""],["Generated:",new Date().toLocaleDateString(),"","","",""],[""],["Date","Location","Gallons","Price/Gal ($)","Total ($)","Odometer","Load #"],...fuel.map(f=>[f.date,f.location,Number(f.gallons),Number(f.pricePerGallon),Number(f.total),Number(f.odometer),f.loadNumber]),[""],["TOTALS","",`=SUM(C5:C${4+fuel.length})`,"",`=SUM(E5:E${4+fuel.length})`,"",""]]);

    ws3["!cols"]=[{wch:28},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws3,"Earnings Summary");

  if (reportType==="all"||reportType==="mileage") {

    ws4["!cols"]=[14,18,18,10,12,12].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb,ws4,"Mileage");
  }
  XLSX.writeFile(wb,`HaulTrack_Report_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function ActiveLoadsPage({ loads, onBack }) {
  const T = useT();
  const active     = useMemo(()=>loads.filter(l=>l.status!=="Delivered"&&l.status!=="Cancelled"),[loads]);
  const booked     = active.filter(l=>l.status==="Booked");
  const inTransit  = active.filter(l=>l.status==="In Transit");
  const [filter, setFilter] = useState("All");
  const [sortBy, setSortBy] = useState("date");
  const filtered = useMemo(()=>{
    let list = filter==="All" ? active : active.filter(l=>l.status===filter);
    return [...list].sort((a,b)=>{ if(sortBy==="date") return (b.date||"").localeCompare(a.date||""); if(sortBy==="rate") return Number(b.rate||0)-Number(a.rate||0); return Number(b.miles||0)-Number(a.miles||0); });
  },[active,filter,sortBy]);

// ─── Miles Map Page — all load origins & destinations on a map ───────────────

function MilesMapPage({ loads, onBack, darkMode, T }) {
  const leafletLoaded = useLeafletLoaded();
  const mapRef   = useRef(null);
  const divRef   = useRef(null);
  const initDone = useRef(false);
  const [status, setStatus] = useState("idle"); // idle | loading | done | error
  const [plotted, setPlotted] = useState(0);

  useEffect(() => {
    if (!leafletLoaded || !divRef.current || initDone.current) return;
    initDone.current = true;

    const L = window.L;
    const tileUrl = darkMode
      ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      : "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png";

    const map = L.map(divRef.current, { zoomControl: true, attributionControl: false });
    L.tileLayer(tileUrl, { maxZoom: 18 }).addTo(map);
    mapRef.current = map;

    const uniquePlaces = [...new Set(
      loads.flatMap(l => [l.origin, l.destination].filter(Boolean).map(p => p.trim()))
    )];

    if (uniquePlaces.length === 0) {
      map.setView([39.5, -98.35], 4);
      setStatus("done");
      return;
    }

    setStatus("loading");

    const mkIcon = (color, label) => L.divIcon({
      html: `<div style="background:${color};color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;padding:3px 7px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 8px #0006;border:1px solid ${color}88">${label}</div>`,
      className: "", iconAnchor: [0, 0]
    });

    // Count how many times each place appears as origin vs destination
    const originSet = new Set(loads.map(l => l.origin?.trim()).filter(Boolean));
    const destSet   = new Set(loads.map(l => l.destination?.trim()).filter(Boolean));

    const bounds = [];
    let count = 0;

    Promise.allSettled(uniquePlaces.map(async place => {
      try {
        const coords = await geocodePlace(place);
        if (!coords) return;
        const [lat, lng] = coords;
        bounds.push([lat, lng]);
        const isOrigin = originSet.has(place);
        const isDest   = destSet.has(place);
        const color = isOrigin && isDest ? "#a78bfa" : isOrigin ? "#4ade80" : "#f87171";
        const marker = L.marker([lat, lng], { icon: mkIcon(color, place) }).addTo(map);
        marker.bindPopup(`
          <div style="font-family:'Rajdhani',sans-serif;min-width:160px">
            <div style="font-weight:700;font-size:14px;margin-bottom:6px;color:#f59e0b">${place}</div>
            ${isOrigin ? `<div style="font-size:11px;color:#4ade80">🟢 Origin on ${loads.filter(l=>l.origin?.trim()===place).length} load(s)</div>` : ""}
            ${isDest   ? `<div style="font-size:11px;color:#f87171">🔴 Destination on ${loads.filter(l=>l.destination?.trim()===place).length} load(s)</div>` : ""}
          </div>
        `);
        count++;
        setPlotted(count);
      } catch {}
    })).then(() => {
      if (bounds.length > 0) {
        map.fitBounds(bounds, { padding: [40, 40] });
        setTimeout(() => map.invalidateSize(), 100);
      } else {
        map.setView([39.5, -98.35], 4);
      }
      setStatus("done");
    });

    return () => { try { map.remove(); } catch {} mapRef.current = null; };
  }, [leafletLoaded]);

  return (
    <div className="fade-in">
      <SectionTitle onBack={onBack} sub={`${loads.length} loads · ${[...new Set(loads.flatMap(l=>[l.origin,l.destination].filter(Boolean)))].length} unique locations`}>
        Miles Map
      </SectionTitle>

      {/* Legend */}
      <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:14 }}>
        {[["#4ade80","Origin only"],["#f87171","Destination only"],["#a78bfa","Both"]].map(([color,label])=>(
          <div key={label} style={{ display:"flex", alignItems:"center", gap:6, fontSize:11, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
            <div style={{ width:10, height:10, borderRadius:2, background:color }} />{label}
          </div>
        ))}
      </div>

      {/* Map */}
      <div style={{ position:"relative", borderRadius:12, overflow:"hidden", border:`1px solid ${T.border}`, marginBottom:16 }}>
        <div ref={divRef} style={{ width:"100%", height:460, background: darkMode?"#0d1b2e":"#dde8f0" }} />
        {status === "loading" && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background: darkMode?"#0d1b2ecc":"#dde8f0cc", backdropFilter:"blur(2px)", zIndex:1000 }}>
            <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 20px", fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600, display:"flex", alignItems:"center", gap:8 }}>
              <Spinner /> Geocoding locations… {plotted > 0 ? `${plotted} plotted` : ""}
            </div>
          </div>
        )}
        {!leafletLoaded && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
            <Spinner />
          </div>
        )}
      </div>

      {/* Location list */}
      <Card>
        <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:12 }}>All Locations</div>
        {[...new Set(loads.flatMap(l=>[l.origin,l.destination].filter(Boolean).map(p=>p.trim())))].sort().map(place => {
          const oCount = loads.filter(l=>l.origin?.trim()===place).length;
          const dCount = loads.filter(l=>l.destination?.trim()===place).length;
          const color  = oCount && dCount ? "#a78bfa" : oCount ? "#4ade80" : "#f87171";
          return (
            <div key={place} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:`1px solid ${T.divider}` }}>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <div style={{ width:8, height:8, borderRadius:"50%", background:color, flexShrink:0 }} />
                <span style={{ fontSize:13, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>{place}</span>
              </div>
              <div style={{ display:"flex", gap:10, fontSize:11, color:T.textFaint }}>
                {oCount > 0 && <span style={{ color:"#4ade80" }}>🟢 {oCount}×</span>}
                {dCount > 0 && <span style={{ color:"#f87171" }}>🔴 {dCount}×</span>}
              </div>
            </div>
          );
        })}
      </Card>
    </div>
  );
}

// ─── Leaflet Route Map (OpenStreetMap + OSRM — no API key needed) ─────────────

function useLeafletLoaded() {
  const [loaded, setLoaded] = useState(!!window.L);
  useEffect(() => {
    if (window.L) { setLoaded(true); return; }
    if (!document.querySelector("#leaflet-css")) {
      const link = document.createElement("link");
      link.id = "leaflet-css"; link.rel = "stylesheet";
      link.href = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css";
      document.head.appendChild(link);
    }
    if (!document.querySelector("#leaflet-js")) {
      const script = document.createElement("script");
      script.id = "leaflet-js";
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js";
      script.onload = () => setLoaded(true);
      document.head.appendChild(script);
    } else {
      const poll = setInterval(() => { if (window.L) { clearInterval(poll); setLoaded(true); } }, 100);
      return () => clearInterval(poll);
    }
  }, []);
  return loaded;
}

// Geocode via Nominatim (free OSM geocoder)
async function geocodePlace(place) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(place)}&format=json&limit=1&countrycodes=us`,
      { headers: { "Accept-Language": "en" } }
    );
    const data = await res.json();
    if (!data[0]) return null;
    return [parseFloat(data[0].lat), parseFloat(data[0].lon)]; // [lat, lng]
  } catch { return null; }
}

// Route via OSRM (free, no key)
async function fetchOSRMRoute(coords) {
  // coords = [[lat,lng], ...]
  const waypoints = coords.map(c => `${c[1]},${c[0]}`).join(";"); // OSRM wants lng,lat
  const res = await fetch(
    `https://router.project-osrm.org/route/v1/driving/${waypoints}?overview=full&geometries=geojson`
  );
  const data = await res.json();
  const route = data.routes?.[0];
  if (!route) return null;
  // GeoJSON coords are [lng, lat] — convert to Leaflet [lat, lng]
  const latLngs = route.geometry.coordinates.map(c => [c[1], c[0]]);
  return { latLngs, totalMeters: route.distance };
}

function RouteMap({ origin, destination, stops = [], darkMode, T, onMilesCalculated }) {
  const leafletLoaded = useLeafletLoaded();
  const [status, setStatus] = useState("loading");
  const [routeMiles, setRouteMiles] = useState(null);
  const mapRef = useRef(null);
  const initDoneRef = useRef(false);

  const validStops = (stops || []).filter(s => s.location?.trim());
  const allLabels = [origin, ...validStops.map(s => s.location), destination];

  const initMap = (el) => {
    if (!el || !window.L || initDoneRef.current) return;
    initDoneRef.current = true;

    const L = window.L;

    // Destroy any lingering instance
    if (mapRef.current) { try { mapRef.current.remove(); } catch(e){} mapRef.current = null; }

    const map = L.map(el, { center:[39,-98], zoom:4, zoomControl:true, attributionControl:false });
    mapRef.current = map;

    L.tileLayer(
      darkMode
        ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
        : "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
      { maxZoom:19, subdomains:"abcd" }
    ).addTo(map);

    const run = async () => {
      try {
        const coords = await Promise.all(allLabels.map(geocodePlace));
        if (coords.some(c => !c)) { setStatus("error"); return; }

        const result = await fetchOSRMRoute(coords);
        if (result) {
          const miles = Math.round(result.totalMeters * 0.000621371);
          setRouteMiles(miles);
          if (onMilesCalculated) onMilesCalculated(miles);
          L.polyline(result.latLngs, { color:"#f59e0b", weight:7, opacity:0.18 }).addTo(map);
          L.polyline(result.latLngs, { color:"#f59e0b", weight:3, opacity:1 }).addTo(map);
        }

        const makeCircleIcon = (color) => L.divIcon({
          className: "",
          html: `<div style="width:14px;height:14px;background:${color};border:3px solid white;border-radius:50%;box-shadow:0 2px 8px ${color}99"></div>`,
          iconSize:[14,14], iconAnchor:[7,7],
        });

        coords.forEach((coord, i) => {
          const isFirst = i === 0, isLast = i === coords.length - 1;
          const color = isFirst ? "#4ade80" : isLast ? "#f87171" : "#f59e0b";
          const icon = (isFirst || isLast)
            ? makeCircleIcon(color)
            : L.divIcon({
                className:"",
                html:`<div style="width:20px;height:20px;background:#f59e0b;border:2px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(245,158,11,0.7);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;color:#0a0f1a">${i}</div>`,
                iconSize:[20,20], iconAnchor:[10,10],
              });
          const popupText = isFirst ? `📍 ${allLabels[i]}` : isLast ? `🏁 ${allLabels[i]}` : `Stop ${i}: ${allLabels[i]}`;
          L.marker(coord, { icon }).bindPopup(`<strong style="font-size:11px">${popupText}</strong>`).addTo(map);
        });

        map.fitBounds(L.latLngBounds(coords), { padding:[40,40], maxZoom:10 });
        // Force tile redraw after bounds set
        setTimeout(() => map.invalidateSize(), 100);
        setStatus("ready");
      } catch(e) {
        console.error(e);
        setStatus("error");
      }
    };

    run();
  };

  // Callback ref: fires as soon as the div enters the DOM
  const containerRef = useCallback((el) => {
    if (!el) return;
    if (window.L) {
      // Small delay to let modal finish its CSS transition
      setTimeout(() => initMap(el), 80);
    } else {
      // Poll until Leaflet script finishes loading
      const poll = setInterval(() => {
        if (window.L) { clearInterval(poll); setTimeout(() => initMap(el), 80); }
      }, 100);
    }
  }, [origin, destination, darkMode, stops]);

  useEffect(() => {
    return () => { if (mapRef.current) { try { mapRef.current.remove(); } catch(e){} mapRef.current = null; } };
  }, []);

  const legendItems = [
    { color:"#4ade80", label: origin },
    ...validStops.map((s, i) => ({ color:"#f59e0b", label: `Stop ${i+1}: ${s.location}` })),
    { color:"#f87171", label: destination },
  ];

  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ position:"relative", borderRadius:10, overflow:"hidden", border:`1px solid ${T.border}` }}>
        <div
          key={allLabels.join("||") + darkMode}
          ref={containerRef}
          style={{ width:"100%", height:220, background: darkMode ? "#0d1b2e" : "#dde8f0" }}
        />
        {status === "loading" && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", background: darkMode?"#0d1b2ecc":"#dde8f0cc", backdropFilter:"blur(2px)", zIndex:1000 }}>
            <div style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"8px 18px", fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600, letterSpacing:1, display:"flex", alignItems:"center", gap:6 }}>
              <Spinner /> Loading route...
            </div>
          </div>
        )}
        {status === "error" && (
          <div style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
            <div style={{ fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif" }}>⚠️ Could not load route</div>
          </div>
        )}
        {routeMiles && status === "ready" && (
          <div style={{ position:"absolute", top:10, left:10, background:T.card+"ee", border:`1px solid ${T.border}`, borderRadius:6, padding:"4px 10px", fontSize:11, color:"#f59e0b", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1, zIndex:1000, backdropFilter:"blur(4px)" }}>
            🛣️ {routeMiles.toLocaleString()} mi
          </div>
        )}
      </div>
      <div style={{ display:"flex", gap:12, marginTop:8, justifyContent:"center", flexWrap:"wrap" }}>
        {legendItems.map(({ color, label }, i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:4 }}>
            <div style={{ width:8, height:8, borderRadius:"50%", background:color, flexShrink:0, boxShadow:`0 0 5px ${color}88` }} />
            <span style={{ fontSize:10, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>{label}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

      const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=rej;r.readAsDataURL(docFile);});
      const parts=[];
      if (docFile.type.startsWith("image/")) parts.push({type:"image",source:{type:"base64",media_type:docFile.type,data:b64}});
      else if (docFile.type==="application/pdf") parts.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}});
      parts.push({type:"text",text:`Extract all key trucking info from this ${docType}. Return ONLY a JSON object, no markdown. Fields: loadNumber, origin, destination, miles, rate, broker, commodity, date, shipper, consignee, weight, pickupDate, deliveryDate, bolNumber, proNumber, specialInstructions, temperature. Use null for missing.`});
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:parts}]})});
      const d=await res.json();
      setExtracted(JSON.parse(d.content?.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim()));
    } catch { setExtractErr("Could not extract. Make sure the file is a clear image or PDF."); }
    finally { setExtracting(false); }
  };
  const [linkToLoadId, setLinkToLoadId] = useState("");

  const addFromExtract = () => {
    if (!extracted) return;
    setLoadForm({loadNumber:extracted.loadNumber||extracted.bolNumber||extracted.proNumber||"",origin:extracted.origin||extracted.shipper||"",destination:extracted.destination||extracted.consignee||"",miles:extracted.miles||"",rate:extracted.rate||"",broker:extracted.broker||"",commodity:extracted.commodity||"",date:extracted.date||extracted.pickupDate||"",status:"Booked"});

  };

  const linkExtractToLoad = () => {
    if (!extracted || !linkToLoadId) return;
    const target = loads.find(l => l.id === Number(linkToLoadId));
    if (!target) return;
    const merged = {
      ...target,
      loadNumber: extracted.loadNumber || extracted.bolNumber || extracted.proNumber || target.loadNumber,
      origin:     extracted.origin || extracted.shipper || target.origin,
      destination:extracted.destination || extracted.consignee || target.destination,
      miles:      extracted.miles || target.miles,
      rate:       extracted.rate || target.rate,
      broker:     extracted.broker || target.broker,
      commodity:  extracted.commodity || target.commodity,
      date:       extracted.date || extracted.pickupDate || target.date,
      mc:         extracted.mc || target.mc,
      contact:    extracted.contact || target.contact,

              style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"20px 28px", marginBottom:12, borderColor:"#34d39933" }}
            >
              <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                <span style={{ fontSize:28 }}>📦</span>
                <div>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:36, fontWeight:700, color:"#34d399", lineHeight:1 }}>{loads.length}</div>
                  <div style={{ fontSize:10, color:T.textDim, letterSpacing:1.5, textTransform:"uppercase", marginTop:3 }}>Total Loads</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:20, flexWrap:"wrap" }}>
                {[
                  ["Booked",     loads.filter(l=>l.status==="Booked").length,     "#60a5fa"],
                  ["In Transit", loads.filter(l=>l.status==="In Transit").length,  "#a78bfa"],
                  ["Delivered",  loads.filter(l=>l.status==="Delivered").length,   "#34d399"],
                  ["Cancelled",  loads.filter(l=>l.status==="Cancelled").length,   "#f87171"],
                ].map(([lbl, count, color])=>(
                  <div key={lbl} style={{ textAlign:"center" }}>
                    <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:18, color }}>{count}</div>
                    <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1.2, textTransform:"uppercase" }}>{lbl}</div>
                  </div>
                ))}
              </div>
            </div>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(175px,1fr))", gap:12, marginBottom:24 }}>
              {metrics.map(m=>(
                <div key={m.label} className={`metric-box ${m.clickable?"clickable":""}`} onClick={m.clickable?m.onClick:undefined}>
                  <div style={{ fontSize:20, marginBottom:6 }}>{m.icon}</div>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:24, fontWeight:700, color:m.color, lineHeight:1 }}>{m.value}</div>
                  <div style={{ fontSize:10, color:T.textDim, letterSpacing:1.5, textTransform:"uppercase", marginTop:4 }}>{m.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ═══ LOADS ═══ */}
        {tab==="Loads"&&(
          <div className="fade-in">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:10 }}>
              <SectionTitle sub={`${loads.length} loads · ${fmt$(totalRev)} total revenue`}>Load Management</SectionTitle>
              <div style={{ display:"flex", gap:8 }}>
                <Btn variant="excel" onClick={()=>exportExcel(loads,fuel,"loads")}>⬇ Excel</Btn>
                <Btn onClick={()=>setShowLoadForm(v=>!v)}>{showLoadForm?"✕ Cancel":"+ Add Load"}</Btn>
              </div>
            </div>
            {showLoadForm&&(
              <Card style={{ marginBottom:20, borderColor:"#f59e0b44" }} className="fade-in">
                <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15, letterSpacing:2, textTransform:"uppercase", color:"#f59e0b", marginBottom:16 }}>New Load Entry</div>

                {/* ── AI Scan Section ── */}
                <div style={{ background:T.bg, border:`1px dashed ${loadScanning?"#f59e0b":T.border}`, borderRadius:10, padding:"14px 16px", marginBottom:20 }}>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>🤖 Scan Rate Con / BOL</div>
                  <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                    <label style={{ flex:1, minWidth:160, display:"flex", alignItems:"center", gap:8, background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
                      📎 {loadScanFile ? loadScanFile.name : "Choose image or PDF"}
                      <input type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={e=>{ setLoadScanFile(e.target.files[0]||null); setLoadScanErr(""); }} />
                    </label>
                    <button onClick={()=>scanLoadDocument(loadScanFile)} disabled={!loadScanFile||loadScanning}
                      style={{ flexShrink:0, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1.5, textTransform:"uppercase", padding:"8px 16px", borderRadius:8, border:"none", cursor: loadScanFile&&!loadScanning?"pointer":"default", background: loadScanFile&&!loadScanning?"#f59e0b":"#f59e0b33", color: loadScanFile&&!loadScanning?"#000":"#f59e0b88" }}>
                      {loadScanning ? "Scanning…" : "Extract ✨"}
                    </button>
                  </div>
                  {loadScanErr && <div style={{ marginTop:8, fontSize:11, color:"#f87171" }}>{loadScanErr}</div>}
                  {!loadScanFile && <div style={{ marginTop:6, fontSize:10, color:T.textFaint }}>Upload a rate confirmation or bill of lading to auto-fill the form below.</div>}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>
                  {[["loadNumber","Load Number"],["broker","Broker"],["mc","MC #"],["contact","Contact"],["origin","Origin"],["destination","Destination"],["miles","Miles"],["rate","Rate ($)"],["commodity","Commodity"],["date","Pickup Date"],["dateDelivered","Date Delivered"]].map(([k,lbl])=>(
                    <Input key={k} label={lbl} type={k==="date"||k==="dateDelivered"?"date":"text"} value={loadForm[k]} onChange={e=>setLoadForm(p=>({...p,[k]:e.target.value}))} />
                  ))}
                </div>
                <div style={{ marginBottom:20 }}>
                  <Select label="Status" value={loadForm.status} onChange={e=>setLoadForm(p=>({...p,status:e.target.value}))}>
                    {["Booked","In Transit","Delivered","Cancelled"].map(s=><option key={s}>{s}</option>)}
                  </Select>
                </div>

                {/* ── Extra Charges ── */}
                <div style={{ marginBottom:20 }}>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>Extra Charges</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                    <div>
                      <label style={{ fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:T.textSub, display:"block", marginBottom:5, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>Charge Type</label>
                      <select
                        value={loadForm.extraCharge}
                        onChange={e => setLoadForm(p=>({...p, extraCharge:e.target.value, extraChargeAmount: e.target.value ? p.extraChargeAmount : ""}))}
                        style={{ background:T.input, border:`1px solid ${T.border}`, borderRadius:6, color: loadForm.extraCharge ? T.text : T.textFaint, fontFamily:"'Rajdhani',sans-serif", fontSize:13, fontWeight:600, letterSpacing:1, padding:"9px 12px", width:"100%", outline:"none" }}
                      >
                        <option value="">— None —</option>
                        <option value="TONU">TONU (Truck Order Not Used)</option>
                        <option value="Detention">Detention</option>
                        <option value="TONU + Detention">TONU + Detention</option>
                      </select>
                    </div>
                    {loadForm.extraCharge && (
                      <Input
                        label={`${loadForm.extraCharge} Amount ($)`}
                        type="number"
                        value={loadForm.extraChargeAmount}
                        onChange={e=>setLoadForm(p=>({...p, extraChargeAmount:e.target.value}))}
                        placeholder="0.00"
                      />
                    )}
                  </div>
                  {loadForm.extraCharge && loadForm.extraChargeAmount && (
                    <div style={{ marginTop:10, background: loadForm.extraCharge==="TONU" ? "#dc262618" : loadForm.extraCharge==="Detention" ? "#1d4ed818" : "#7c3aed18", border:`1px solid ${loadForm.extraCharge==="TONU" ? "#dc262633" : loadForm.extraCharge==="Detention" ? "#1d4ed833" : "#7c3aed33"}`, borderRadius:7, padding:"8px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <span style={{ fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
                        {loadForm.extraCharge === "TONU" ? "🚫" : loadForm.extraCharge === "Detention" ? "⏱" : "🚫⏱"} {loadForm.extraCharge}
                      </span>
                      <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15, color: loadForm.extraCharge==="TONU" ? "#f87171" : loadForm.extraCharge==="Detention" ? "#60a5fa" : "#c084fc" }}>
                        +{fmt$(loadForm.extraChargeAmount)}
                      </span>
                    </div>
                  )}
                </div>

                {/* ── Stops section ── */}
                <div style={{ marginBottom:20 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                    <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint }}>
                      Intermediate Stops {newLoadStops.length > 0 && <span style={{ color:"#f59e0b", marginLeft:4 }}>({newLoadStops.length})</span>}
                    </div>
                    <button
                      onClick={()=>setNewLoadStops(p=>[...p, {id:Date.now(), location:"", date:"", notes:""}])}
                      style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.2, textTransform:"uppercase", padding:"5px 12px", borderRadius:6, border:"1px solid #f59e0b44", background:"#f59e0b18", color:"#f59e0b", cursor:"pointer" }}
                    >+ Add Stop</button>
                  </div>

                  {newLoadStops.length === 0 && (
                    <div style={{ textAlign:"center", padding:"18px 0", border:`1px dashed ${T.border}`, borderRadius:8, color:T.textFaint, fontSize:12, fontFamily:"'Rajdhani',sans-serif" }}>
                      No stops added — this is a direct load
                    </div>
                  )}

                  {newLoadStops.length > 0 && (
                    <div style={{ position:"relative" }}>
                      <div style={{ position:"absolute", left:11, top:20, bottom:20, width:2, background:`linear-gradient(180deg,#4ade8066,#f59e0b66,#f8717166)`, borderRadius:1, zIndex:0 }} />

                      {/* Origin pin */}
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, position:"relative", zIndex:1 }}>
                        <div style={{ width:24, height:24, borderRadius:"50%", background:"#4ade8022", border:"2px solid #4ade80", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                          <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ade80" }} />
                        </div>
                        <span style={{ fontSize:12, color:"#4ade80", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{loadForm.origin || "Origin"}</span>
                      </div>

                      {/* Stop rows */}
                      {newLoadStops.map((stop, idx) => (
                        <div key={stop.id} style={{ marginBottom:8, position:"relative", zIndex:1 }}>
                          <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                            <div style={{ width:24, height:24, borderRadius:"50%", background:"#f59e0b22", border:"2px solid #f59e0b66", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:8, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:10, color:"#f59e0b" }}>
                              {idx+1}
                            </div>
                            <div style={{ flex:1, background:T.bg, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 12px" }}>
                              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:8 }}>
                                <Input
                                  label="Stop Location"
                                  value={stop.location}
                                  onChange={e=>setNewLoadStops(p=>p.map((s,i)=>i===idx?{...s,location:e.target.value}:s))}
                                  placeholder="City, ST"
                                />
                                <Input
                                  label="Date"
                                  type="date"
                                  value={stop.date}
                                  onChange={e=>setNewLoadStops(p=>p.map((s,i)=>i===idx?{...s,date:e.target.value}:s))}
                                />
                              </div>
                              <Input
                                label="Notes (optional)"
                                value={stop.notes}
                                onChange={e=>setNewLoadStops(p=>p.map((s,i)=>i===idx?{...s,notes:e.target.value}:s))}
                                placeholder="e.g. Pickup 40 pallets, dock #3"
                              />
                              <div style={{ display:"flex", gap:6, marginTop:8 }}>
                                {idx > 0 && (
                                  <button onClick={()=>setNewLoadStops(p=>{const a=[...p];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a;})} style={{ fontSize:11, color:T.textDim, background:"none", border:`1px solid ${T.border}`, borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>↑ Up</button>
                                )}
                                {idx < newLoadStops.length-1 && (
                                  <button onClick={()=>setNewLoadStops(p=>{const a=[...p];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a;})} style={{ fontSize:11, color:T.textDim, background:"none", border:`1px solid ${T.border}`, borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>↓ Down</button>
                                )}
                                <button onClick={()=>setNewLoadStops(p=>p.filter((_,i)=>i!==idx))} style={{ fontSize:11, color:"#f87171", background:"#dc262610", border:"1px solid #dc262633", borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600, marginLeft:"auto" }}>✕ Remove</button>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}

                      {/* Destination pin */}
                      <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:4, position:"relative", zIndex:1 }}>
                        <div style={{ width:24, height:24, borderRadius:"50%", background:"#f8717122", border:"2px solid #f87171", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                          <div style={{ width:8, height:8, borderRadius:"50%", background:"#f87171" }} />
                        </div>
                        <span style={{ fontSize:12, color:"#f87171", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{loadForm.destination || "Destination"}</span>
                      </div>
                    </div>
                  )}
                </div>

                {/* Live route preview */}
                {liveNewMap && (
                  <div style={{ marginBottom:16 }}>
                    <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:8 }}>
                      Live Route Preview
                      {loadForm.miles && <span style={{ color:"#f59e0b", marginLeft:8 }}>· {Number(loadForm.miles).toLocaleString()} mi (auto-calculated)</span>}
                    </div>
                    <RouteMap
                      origin={liveNewMap.origin}
                      destination={liveNewMap.destination}
                      stops={liveNewMap.stops}
                      darkMode={darkMode}
                      T={T}
                      onMilesCalculated={m => setLoadForm(p=>({...p, miles:String(m)}))}
                    />
                  </div>
                )}

                <div style={{ display:"flex", gap:8 }}>
                  <Btn onClick={saveLoad}>Save Load</Btn>
                  <Btn variant="ghost" onClick={()=>{ setShowLoadForm(false); setNewLoadStops([]); setLiveNewMap(null); }}>Cancel</Btn>
                </div>
              </Card>
            )}
            <Card>
              {loads.map((l, idx)=>(
                <div key={l.id}>
                  <div className="xrow row-hover" style={{ padding:"14px 8px", cursor:"pointer" }} onClick={()=>{ setSelectedLoad(l); setEditingLoad(false); }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                    <div style={{ display:"flex", gap:16, alignItems:"center", flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:16, color:"#f59e0b", minWidth:90 }}>{l.loadNumber}</span>
                      <div>
                        <div style={{ fontSize:13, color:T.text }}>{l.origin} <span style={{ color:T.textFaint }}>→</span> {l.destination}</div>
                        <div style={{ fontSize:11, color:T.textDim, marginTop:2 }}>📦 {l.commodity} · 🏢 {l.broker} · 📅 {fmtDate(l.date)}</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                      <div style={{ textAlign:"right" }}>
                        <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:16, color:T.text }}>{fmt$(l.rate)}</div>
                        <div style={{ fontSize:10, color:T.textDim }}>{fmtNum(l.miles)} mi · ${Number(l.miles)>0?(Number(l.rate)/Number(l.miles)).toFixed(2):"0.00"}/mi</div>
                      </div>
                      <Tag status={l.status} />
                    </div>
                  </div>
                </div>
                {idx < loads.length - 1 && (
                  <div style={{ height:1, background:T.border, margin:"0 8px" }} />
                )}
              </div>
              ))}
            </Card>

            {/* ── Load Detail Modal ── */}
            {selectedLoad&&(
              <div style={{ position:"fixed", inset:0, zIndex:200, display:"flex", alignItems:"flex-start", justifyContent:"center" }} onClick={e=>{if(e.target===e.currentTarget){setSelectedLoad(null);setEditingLoad(false);}}}>
                <div style={{ position:"absolute", inset:0, background:"#00000066", backdropFilter:"blur(2px)" }} onClick={()=>{setSelectedLoad(null);setEditingLoad(false);}} />
                <div className="slide-down" style={{ position:"relative", width:"100%", maxWidth:640, background:T.card, borderRadius:"0 0 16px 16px", border:`1px solid ${T.border}`, borderTop:"none", padding:0, maxHeight:"85vh", overflowY:"auto", boxShadow:"0 8px 40px #00000044" }}>

                  {/* Modal Header */}
                  <div style={{ padding:"20px 24px 0", display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div>
                      <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:22, letterSpacing:2, color:"#f59e0b" }}>{selectedLoad.loadNumber}</div>
                      <div style={{ fontSize:12, color:T.textSub, marginTop:3 }}>{selectedLoad.origin} → {selectedLoad.destination}</div>
                    </div>
                    <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <Tag status={selectedLoad.status} />
                      <button onClick={()=>{setSelectedLoad(null);setEditingLoad(false);}} style={{ background:"none", border:`1px solid ${T.border}`, borderRadius:6, color:T.textSub, cursor:"pointer", fontSize:16, width:30, height:30, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                    </div>
                  </div>

                  <div style={{ padding:"20px 24px 32px" }}>
                    {!editingLoad ? (
                      <>
                        {/* Key metrics strip */}
                        <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:16 }}>
                          {[
                            {label:"Rate",   value:fmt$(selectedLoad.rate),  color:"#f59e0b"},
                            {label:"Miles",  value:fmtNum(selectedLoad.miles), color:"#60a5fa"},
                            {label:"$/Mile", value:"$"+(Number(selectedLoad.miles)>0?(Number(selectedLoad.rate)/Number(selectedLoad.miles)).toFixed(2):"0.00"), color:"#a78bfa"},
                          ].map(m=>(
                            <div key={m.label} style={{ background:T.bg, border:`1px solid ${T.border}`, borderRadius:8, padding:"12px 14px", textAlign:"center" }}>
                              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:20, color:m.color }}>{m.value}</div>
                              <div style={{ fontSize:10, color:T.textDim, letterSpacing:1.5, textTransform:"uppercase", marginTop:2 }}>{m.label}</div>
                            </div>
                          ))}
                        </div>

                        {/* Status update — moved to top */}
                        <div style={{ marginBottom:20 }}>
                          <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>Update Status</div>
                          <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                            {["Booked","In Transit","Delivered","Cancelled"].map(s=>{
                              const active = selectedLoad.status===s;
                              const c = STATUS_COLORS[s];
                              return (
                                <button key={s} onClick={()=>{
                                  const updated={...selectedLoad,status:s};
                                  setLoads(p=>p.map(l=>l.id===selectedLoad.id?updated:l));
                                  setSelectedLoad(updated);
                                }} style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.2, textTransform:"uppercase", padding:"6px 14px", borderRadius:6, border:`1px solid ${active?c.border:T.border}`, background:active?c.bg:"transparent", color:active?c.text:T.textDim, cursor:"pointer", transition:"all 0.15s" }}>
                                  {active?"✓ ":""}{s}
                                </button>
                              );
                            })}
                          </div>
                        </div>

                        {/* Details grid */}
                        <div style={{ marginBottom:20 }}>
                          <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:12 }}>Load Details</div>

                          {/* Route Map */}
                          {selectedLoad.origin && selectedLoad.destination && (
                            <RouteMap
                              origin={selectedLoad.origin}
                              destination={selectedLoad.destination}
                              stops={selectedLoad.stops||[]}
                              darkMode={darkMode}
                              T={T}
                            />
                          )}

                          {[
                            {label:"Load Number",   value:selectedLoad.loadNumber},
                            {label:"Broker",        value:selectedLoad.broker},
                            {label:"MC #",          value:selectedLoad.mc},
                            {label:"Contact",       value:selectedLoad.contact},
                            {label:"Commodity",     value:selectedLoad.commodity},
                            {label:"Pickup Date",   value:fmtDate(selectedLoad.date)},
                            {label:"Date Delivered",value:fmtDate(selectedLoad.dateDelivered)},
                            {label:"Origin",        value:selectedLoad.origin},
                            {label:"Destination",   value:selectedLoad.destination},
                            ...(selectedLoad.extraCharge ? [{label:"Extra Charge", value:`${selectedLoad.extraCharge}${selectedLoad.extraChargeAmount ? " — "+fmt$(selectedLoad.extraChargeAmount) : ""}`}] : []),
                          ].map(r=>(
                            <div key={r.label} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 0", borderBottom:`1px solid ${T.divider}` }}>
                              <span style={{ fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600, letterSpacing:0.5 }}>{r.label}</span>
                              <span style={{ fontSize:13, color:T.text, fontWeight:500, maxWidth:"60%", textAlign:"right" }}>{r.value || "—"}</span>
                            </div>
                          ))}

                          {/* Stops timeline (read mode) */}
                          {selectedLoad.stops?.length > 0 && (
                            <div style={{ marginTop:16 }}>
                              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:12 }}>
                                Route Stops ({selectedLoad.stops.length})
                              </div>
                              <div style={{ position:"relative" }}>
                                <div style={{ position:"absolute", left:11, top:16, bottom:16, width:2, background:`linear-gradient(180deg,#4ade8055,#f59e0b55,#f8717155)`, borderRadius:1 }} />
                                {/* Origin */}
                                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, position:"relative", zIndex:1 }}>
                                  <div style={{ width:24, height:24, borderRadius:"50%", background:"#4ade8022", border:"2px solid #4ade80", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                    <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ade80" }} />
                                  </div>
                                  <span style={{ fontSize:12, color:"#4ade80", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{selectedLoad.origin}</span>
                                </div>
                                {/* Each stop */}
                                {selectedLoad.stops.map((stop, idx) => (
                                  <div key={stop.id} style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:10, position:"relative", zIndex:1 }}>

                                      {idx+1}
                                    </div>
                                    <div>
                                      <div style={{ fontSize:13, color:T.text, fontWeight:500 }}>{stop.location || "—"}</div>

                                  <span style={{ fontSize:12, color:"#f87171", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{selectedLoad.destination}</span>

                            </div>
                          )}

                        {/* Related fuel stops */}
                        {(() => {

                              {related.map(f=>(

                                    <div style={{ fontSize:10, color:T.textDim, marginTop:2 }}>{fmtDate(f.date)} · {f.gallons} gal @ ${f.pricePerGallon}/gal</div>
                                  </div>
                                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, color:"#fb923c" }}>{fmt$(f.total)}</div>
                                </div>
                              ))}
                              <div style={{ display:"flex", justifyContent:"space-between", padding:"10px 0", fontSize:12 }}>
                                <span style={{ color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>Total Fuel Cost</span>
                                <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, color:"#fb923c" }}>{fmt$(related.reduce((s,f)=>s+Number(f.total||0),0))}</span>
                              </div>
                            </div>

                        {/* Attached Document */}
                        {selectedLoad.attachedDoc && (
                          <div style={{ marginBottom:20 }}>
                            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:12 }}>📎 Attached Document</div>
                            <div style={{ background:T.bg, border:`1px solid ${T.border}`, borderRadius:10, padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
                              <div>
                                <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:13, color:T.text }}>{selectedLoad.attachedDoc.name}</div>
                                <div style={{ fontSize:10, color:T.textFaint, marginTop:2, textTransform:"uppercase", letterSpacing:1 }}>{selectedLoad.attachedDoc.type}</div>

                            </div>
                            {selectedLoad.attachedDoc.type?.startsWith("image/") && (
                              <img src={selectedLoad.attachedDoc.dataUrl} alt={selectedLoad.attachedDoc.name} style={{ marginTop:10, width:"100%", maxHeight:320, objectFit:"contain", borderRadius:8, border:`1px solid ${T.border}` }} />
                            )}
                            {selectedLoad.attachedDoc.type === "application/pdf" && (
                              <iframe src={selectedLoad.attachedDoc.dataUrl} title={selectedLoad.attachedDoc.name} style={{ marginTop:10, width:"100%", height:340, borderRadius:8, border:`1px solid ${T.border}` }} />
                            )}
                          </div>
                        )}

                        {/* Action buttons */}
                        <div style={{ display:"flex", gap:8 }}>
                          <button onClick={()=>{ setEditForm({...selectedLoad}); setEditStops(selectedLoad.stops||[]); setEditingLoad(true); }} style={{ flex:1, background:"#f59e0b22", color:"#f59e0b", border:"1px solid #f59e0b44", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", fontSize:12, padding:"10px", borderRadius:6, cursor:"pointer" }}>✏️ Edit Load</button>

                        </div>
                      </>
                    ) : (
                      /* ── Edit form ── */

                          ))}
                        </div>
                        <div style={{ marginBottom:20 }}>
                          <Select label="Status" value={editForm.status||"Booked"} onChange={e=>setEditForm(p=>({...p,status:e.target.value}))}>

                        </div>

                            <div>
                              <label style={{ fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:T.textSub, display:"block", marginBottom:5, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>Charge Type</label>
                              <select
                                value={editForm.extraCharge||""}
                                onChange={e=>setEditForm(p=>({...p, extraCharge:e.target.value, extraChargeAmount: e.target.value ? p.extraChargeAmount : ""}))}

                                <option value="">— None —</option>
                                <option value="TONU">TONU (Truck Order Not Used)</option>
                                <option value="Detention">Detention</option>
                                <option value="TONU + Detention">TONU + Detention</option>
                              </select>
                            </div>
                            {editForm.extraCharge && (
                              <Input
                                label={`${editForm.extraCharge} Amount ($)`}

                            <div style={{ marginTop:10, background: editForm.extraCharge==="TONU" ? "#dc262618" : editForm.extraCharge==="Detention" ? "#1d4ed818" : "#7c3aed18", border:`1px solid ${editForm.extraCharge==="TONU" ? "#dc262633" : editForm.extraCharge==="Detention" ? "#1d4ed833" : "#7c3aed33"}`, borderRadius:7, padding:"8px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>

                                +{fmt$(editForm.extraChargeAmount)}
                              </span>
                            </div>
                          )}
                        </div>
                        <div style={{ marginBottom:20 }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint }}>
                              Intermediate Stops {editStops.length > 0 && <span style={{ color:"#f59e0b", marginLeft:4 }}>({editStops.length})</span>}

                            <button
                              onClick={()=>setEditStops(p=>[...p, {id:Date.now(), location:"", date:"", notes:""}])}

                              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:8, position:"relative", zIndex:1 }}>

                                  <div style={{ width:8, height:8, borderRadius:"50%", background:"#4ade80" }} />
                                </div>
                                <span style={{ fontSize:12, color:"#4ade80", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{editForm.origin || "Origin"}</span>
                              </div>

                              {/* Stop rows */}
                              {editStops.map((stop, idx) => (
                                <div key={stop.id} style={{ marginBottom:8, position:"relative", zIndex:1 }}>
                                  <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                                    {/* Stop number badge */}
                                    <div style={{ width:24, height:24, borderRadius:"50%", background:"#f59e0b22", border:"2px solid #f59e0b66", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, marginTop:8, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:10, color:"#f59e0b" }}>
                                      {idx+1}

                                        <Input
                                          label="Stop Location"
                                          value={stop.location}

                                          label="Date"
                                          type="date"

                                          onChange={e=>setEditStops(p=>p.map((s,i)=>i===idx?{...s,date:e.target.value}:s))}
                                        />
                                      </div>
                                      <Input
                                        label="Notes (optional)"
                                        value={stop.notes}
                                        onChange={e=>setEditStops(p=>p.map((s,i)=>i===idx?{...s,notes:e.target.value}:s))}
                                        placeholder="e.g. Pickup 40 pallets, dock #3"
                                      />
                                      <div style={{ display:"flex", gap:6, marginTop:8 }}>
                                        {idx > 0 && (
                                          <button onClick={()=>setEditStops(p=>{const a=[...p];[a[idx-1],a[idx]]=[a[idx],a[idx-1]];return a;})} style={{ fontSize:11, color:T.textDim, background:"none", border:`1px solid ${T.border}`, borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>↑ Up</button>
                                        )}
                                        {idx < editStops.length-1 && (
                                          <button onClick={()=>setEditStops(p=>{const a=[...p];[a[idx],a[idx+1]]=[a[idx+1],a[idx]];return a;})} style={{ fontSize:11, color:T.textDim, background:"none", border:`1px solid ${T.border}`, borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>↓ Down</button>
                                        )}
                                        <button onClick={()=>setEditStops(p=>p.filter((_,i)=>i!==idx))} style={{ fontSize:11, color:"#f87171", background:"#dc262610", border:"1px solid #dc262633", borderRadius:5, padding:"3px 8px", cursor:"pointer", fontFamily:"'Rajdhani',sans-serif", fontWeight:600, marginLeft:"auto" }}>✕ Remove</button>
                                      </div>
                                    </div>
                                  </div>
                                </div>
                              ))}

                              {/* Destination pin */}
                              <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:4, position:"relative", zIndex:1 }}>
                                <div style={{ width:24, height:24, borderRadius:"50%", background:"#f8717122", border:"2px solid #f87171", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                                  <div style={{ width:8, height:8, borderRadius:"50%", background:"#f87171" }} />
                                </div>
                                <span style={{ fontSize:12, color:"#f87171", fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{editForm.destination || "Destination"}</span>
                              </div>
                            </div>
                          )}
                        </div>

                        {/* Live route preview */}
                        {liveEditMap && (
                          <div style={{ marginBottom:16 }}>
                            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:8 }}>
                              Live Route Preview

                            </div>
                            <RouteMap
                              origin={liveEditMap.origin}
                              destination={liveEditMap.destination}
                              stops={liveEditMap.stops}
                              darkMode={darkMode}
                              T={T}
                              onMilesCalculated={m => setEditForm(p=>({...p, miles:String(m)}))}
                            />
                          </div>
                        )}

                        {/* Attach / Replace Document */}
                        <div style={{ background:T.bg, border:`1px dashed ${T.border}`, borderRadius:10, padding:"12px 16px", marginBottom:16 }}>
                          <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", color:T.textFaint, marginBottom:8 }}>
                            📎 {selectedLoad.attachedDoc ? "Replace Document" : "Attach Document"}
                          </div>
                          {selectedLoad.attachedDoc && (
                            <div style={{ fontSize:11, color:T.textSub, marginBottom:8, fontFamily:"'Rajdhani',sans-serif" }}>Current: {selectedLoad.attachedDoc.name}</div>
                          )}
                          <label style={{ display:"inline-flex", alignItems:"center", gap:8, background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"7px 14px", cursor:"pointer", fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
                            📎 Choose file
                            <input type="file" accept="image/*,application/pdf" style={{ display:"none" }}
                              onChange={async e => {
                                const f = e.target.files[0];

                                  const doc = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res({ name: f.name, type: f.type, dataUrl: r.result }); r.onerror = rej; r.readAsDataURL(f); });
                                  const updated = {...editForm, id:selectedLoad.id, miles:Number(editForm.miles), rate:Number(editForm.rate), stops:editStops, attachedDoc: doc};
                                  setLoads(p=>p.map(l=>l.id===selectedLoad.id ? updated : l));
                                  setSelectedLoad(updated);
                                  setEditForm(p=>({...p, attachedDoc: doc}));
                                } catch {}
                              }}
                            />
                          </label>
                          {editForm.attachedDoc && <span style={{ marginLeft:10, fontSize:11, color:"#4ade80", fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>✓ {editForm.attachedDoc.name}</span>}
                        </div>

                        <div style={{ display:"flex", gap:8 }}>
                          <Btn onClick={()=>saveEdit()}>Save Changes</Btn>
                          <Btn variant="ghost" onClick={()=>{ setEditingLoad(false); setLiveEditMap(null); }}>Cancel</Btn>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>

        {/* ═══ FUEL ═══ */}
        {tab==="Fuel"&&(
          <div className="fade-in">
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:20, flexWrap:"wrap", gap:10 }}>
              <SectionTitle sub={`${fuel.length} entries · ${fmt$(totalFuelCost)} total spend`}>Fuel Tracker</SectionTitle>
              <div style={{ display:"flex", gap:8 }}>
                <Btn variant="excel" onClick={()=>exportExcel(loads,fuel,"fuel")}>⬇ Excel</Btn>
                <Btn onClick={()=>{setShowFuelForm(v=>!v);setScannedFuel(null);setReceiptFile(null);setScanErr("");setFuelEntryMode("manual");}}>{showFuelForm?"✕ Cancel":"+ Log Fuel"}</Btn>
              </div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))", gap:12, marginBottom:20 }}>
              {[
                {label:"Total Fuel Cost",value:fmt$(totalFuelCost),color:"#fb923c"},
                {label:"Total Gallons",value:fmtNum(fuel.reduce((s,f)=>s+Number(f.gallons||0),0)),color:"#60a5fa"},
                {label:"Avg Price/Gal",value:"$"+(fuel.reduce((s,f)=>s+Number(f.gallons||0),0)>0?(totalFuelCost/fuel.reduce((s,f)=>s+Number(f.gallons||0),0)).toFixed(3):"0.000"),color:"#a78bfa"},
                {label:"Cost per Mile",value:"$"+(totalMiles>0?(totalFuelCost/totalMiles).toFixed(3):"0.000"),color:"#34d399"},
              ].map(m=>(
                <div key={m.label} style={{ background:T.metricBg, border:`1px solid ${T.border}`, borderRadius:10, padding:"16px 18px", position:"relative", overflow:"hidden" }}>
                  <div style={{ position:"absolute", top:0, left:0, right:0, height:2, background:`linear-gradient(90deg,${m.color},transparent)` }} />
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontSize:22, fontWeight:700, color:m.color }}>{m.value}</div>
                  <div style={{ fontSize:10, color:T.textDim, letterSpacing:1.5, textTransform:"uppercase", marginTop:4 }}>{m.label}</div>
                </div>
              ))}
            </div>

            {showFuelForm&&(
              <Card style={{ marginBottom:20, borderColor:"#fb923c44" }} className="fade-in">
                {/* Mode tabs */}
                <div style={{ display:"flex", gap:0, marginBottom:18, background:T.bg, borderRadius:8, padding:4 }}>
                  {[["manual","✏️ Manual Entry"],["scan","📷 Scan Receipt"]].map(([mode,label])=>(
                    <button key={mode} onClick={()=>{setFuelEntryMode(mode);setScannedFuel(null);setScanErr("");}} style={{ flex:1, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1.5, textTransform:"uppercase", padding:"8px 12px", borderRadius:6, border:"none", cursor:"pointer", transition:"all 0.15s", background:fuelEntryMode===mode?"#fb923c22":"transparent", color:fuelEntryMode===mode?"#fb923c":T.textDim }}>
                      {label}
                    </button>
                  ))}
                </div>

                {fuelEntryMode==="scan"&&!scannedFuel&&(
                  <div>
                    <label className="upload-area" style={{ display:"block", marginBottom:14, borderColor:receiptFile?"#fb923c44":T.border }}>
                      <input type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={e=>{const f=e.target.files[0];if(f){setReceiptFile(f);setScannedFuel(null);setScanErr("");}}} />
                      {receiptFile ? (
                        <div><div style={{fontSize:28,marginBottom:6}}>🧾</div><div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:700,fontSize:14,color:"#fb923c"}}>{receiptFile.name}</div><div style={{fontSize:11,color:T.textDim,marginTop:3}}>Click to change</div></div>
                      ) : (
                        <div><div style={{fontSize:36,marginBottom:8}}>📷</div><div style={{fontFamily:"'Rajdhani',sans-serif",fontWeight:600,fontSize:15,color:T.textSub}}>Take a photo or upload receipt</div><div style={{fontSize:11,color:T.textFaint,marginTop:4}}>JPG · PNG · PDF — works best with clear, well-lit photos</div></div>
                      )}
                    </label>
                    {scanErr&&<div style={{color:"#f87171",fontSize:12,marginBottom:12,background:"#dc262618",border:"1px solid #dc262633",borderRadius:6,padding:"8px 12px"}}>⚠️ {scanErr}</div>}
                    <button onClick={handleReceiptScan} disabled={!receiptFile||scanningReceipt} style={{width:"100%",background:receiptFile&&!scanningReceipt?"#fb923c":T.border,color:receiptFile&&!scanningReceipt?"#0a0f1a":T.textDim,fontFamily:"'Rajdhani',sans-serif",fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",fontSize:13,padding:"12px",borderRadius:6,border:"none",cursor:receiptFile&&!scanningReceipt?"pointer":"not-allowed",transition:"all 0.2s"}}>

                  </div>

              </Card>
