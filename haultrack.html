                      >
                        <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                          <div style={{ width:36, height:36, borderRadius:8, background:"#f43f5e22", border:"1px solid #f43f5e44", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>🔧</div>
                          <div>
                            <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:14, color:T.textH }}>{s.type}</div>
                            <div style={{ fontSize:11, color:T.textSub, marginTop:2 }}>
                              {s.date}{s.odometer ? ` · ${fmtNum(s.odometer)} mi` : ""}{s.shop ? ` · ${s.shop}` : ""}
                            </div>
                            {s.nextDueMiles && <div style={{ fontSize:10, color:"#f59e0b", marginTop:3, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>⏭ Next: {fmtNum(s.nextDueMiles)} mi{s.nextDueDate ? ` / ${s.nextDueDate}` : ""}</div>}
                          </div>
                        </div>
                        {s.cost > 0 && <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15, color:T.text }}>{fmt$(s.cost)}</span>}
                      </div>
                    ))}
                  </Card>
                )}
              </>
            )}
          </div>
        )}

        {/* ═══ RECEIPTS ═══ */}
        {tab==="Receipts"&&(
          <div className="fade-in">
            <SectionTitle sub="Log and categorize all your business expenses">Expense Receipts</SectionTitle>

            {/* Receipt detail modal */}
            {selectedReceipt&&(
              <div style={{ position:"fixed", inset:0, zIndex:300, display:"flex", alignItems:"flex-end", justifyContent:"center" }} onClick={e=>{ if(e.target===e.currentTarget){setSelectedReceipt(null);setEditingReceipt(false);} }}>
                <div style={{ position:"absolute", inset:0, background:"#00000077", backdropFilter:"blur(3px)" }} onClick={()=>{setSelectedReceipt(null);setEditingReceipt(false);}} />
                <div className="fade-in" style={{ position:"relative", background:T.card, border:`1px solid ${T.border}`, borderRadius:"16px 16px 0 0", width:"100%", maxWidth:540, maxHeight:"82vh", overflowY:"auto", boxShadow:"0 -8px 40px #00000055", paddingBottom:28 }}>
                  <div style={{ padding:"16px 24px", borderBottom:`1px solid ${T.border}`, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div>
                      <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:18, color:"#06b6d4" }}>{selectedReceipt.vendor||"Receipt"}</div>
                      <div style={{ fontSize:11, color:T.textSub, marginTop:2 }}>{selectedReceipt.category} · {selectedReceipt.date}</div>
                    </div>
                    <button onClick={()=>{setSelectedReceipt(null);setEditingReceipt(false);}} style={{ background:"none", border:`1px solid ${T.border}`, borderRadius:6, color:T.textSub, cursor:"pointer", fontSize:16, width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
                  </div>
                  <div style={{ padding:"20px 24px" }}>
                    {editingReceipt ? (
                      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>

                        {/* Per Diem checkbox */}
                        <div style={{ gridColumn:"1/-1" }}>
                          <label style={{ display:"flex", alignItems:"center", gap:10, background: receiptEditForm.perDiem ? "#06b6d411" : T.bg, border:`1px solid ${receiptEditForm.perDiem ? "#06b6d444" : T.border}`, borderRadius:8, padding:"10px 14px", cursor:"pointer", transition:"all 0.2s" }}>
                            <input type="checkbox" checked={!!receiptEditForm.perDiem} onChange={e => {
                              const checked = e.target.checked;
                              setReceiptEditForm(p => ({
                                ...p,
                                perDiem: checked,
                                category: checked ? "Food & Meals" : p.category,
                                amount:   checked ? "69.00" : (p.amount === "69.00" ? "" : p.amount),
                                vendor:   checked ? "Per Diem" : (p.vendor === "Per Diem" ? "" : p.vendor),
                                notes:    checked ? "IRS per diem allowance ($69/day)" : (p.notes === "IRS per diem allowance ($69/day)" ? "" : p.notes),
                              }));
                            }} style={{ width:16, height:16, accentColor:"#06b6d4", cursor:"pointer" }} />
                            <div>
                              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:13, color: receiptEditForm.perDiem ? "#06b6d4" : T.text }}>Per Diem</div>
                              <div style={{ fontSize:10, color:T.textFaint, marginTop:1 }}>IRS trucker per diem — $69/day</div>
                            </div>
                          </label>
                        </div>

                        {[["date","Date","date"],["vendor","Vendor","text"],["amount","Amount ($)","number"],["paymentMethod","Payment Method","text"],["loadNumber","Load # (optional)","text"]].map(([k,lbl,type])=>(
                          <div key={k} style={{ gridColumn: k==="vendor" ? "1/-1" : "auto" }}>
                            <div style={{ fontSize:10, color:T.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:5 }}>{lbl}</div>
                            <input type={type} value={receiptEditForm[k]||""} onChange={e=>setReceiptEditForm(p=>({...p,[k]:e.target.value}))} style={{ width:"100%", background:T.input, border:`1px solid ${T.border}`, borderRadius:8, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontSize:13, padding:"8px 12px", outline:"none", boxSizing:"border-box" }} />
                          </div>
                        ))}
                        <div style={{ gridColumn:"1/-1" }}>
                          <div style={{ fontSize:10, color:T.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:5 }}>Category</div>
                          <select value={receiptEditForm.category||""} onChange={e=>setReceiptEditForm(p=>({...p,category:e.target.value}))} style={{ width:"100%", background:T.input, border:`1px solid ${T.border}`, borderRadius:8, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontSize:13, padding:"8px 12px", outline:"none", boxSizing:"border-box" }}>
                            <option value="">-- Select category --</option>
                            {EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                          </select>
                        </div>
                        <div style={{ gridColumn:"1/-1" }}>
                          <div style={{ fontSize:10, color:T.textFaint, letterSpacing:1.5, textTransform:"uppercase", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, marginBottom:5 }}>Notes</div>
                          <textarea value={receiptEditForm.notes||""} onChange={e=>setReceiptEditForm(p=>({...p,notes:e.target.value}))} rows={3} style={{ width:"100%", background:T.input, border:`1px solid ${T.border}`, borderRadius:8, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontSize:13, padding:"8px 12px", outline:"none", resize:"vertical", boxSizing:"border-box" }} />
                        </div>
                        <div style={{ gridColumn:"1/-1", display:"flex", gap:8 }}>
                          <button onClick={saveReceiptEdit} style={{ flex:1, background:"#06b6d4", color:"#fff", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", fontSize:12, padding:"10px", borderRadius:8, border:"none", cursor:"pointer" }}>Save Changes</button>
                          <button onClick={()=>setEditingReceipt(false)} style={{ padding:"10px 16px", background:"none", border:`1px solid ${T.border}`, borderRadius:8, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600, fontSize:12, cursor:"pointer" }}>Cancel</button>
                        </div>
                      </div>
                    ) : (
                      <>
                        <div style={{ textAlign:"center", marginBottom:20 }}>
                          <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:36, color:"#06b6d4" }}>{fmt$(selectedReceipt.amount)}</div>
                          <div style={{ fontSize:11, color:T.textFaint, marginTop:2 }}>{selectedReceipt.paymentMethod||"—"}</div>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                          {[["🗂 Category",selectedReceipt.category],["📅 Date",selectedReceipt.date],["🏪 Vendor",selectedReceipt.vendor],["💳 Payment",selectedReceipt.paymentMethod||"—"],["📦 Load #",selectedReceipt.loadNumber||"—"]].map(([lbl,val])=>(
                            <div key={lbl} style={{ background:T.bg, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 14px", gridColumn: lbl==="🏪 Vendor"?"1/-1":"auto" }}>
                              <div style={{ fontSize:10, color:T.textFaint, letterSpacing:1, textTransform:"uppercase", fontFamily:"'Rajdhani',sans-serif", marginBottom:3 }}>{lbl}</div>
                              <div style={{ fontSize:13, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>{val}</div>
                            </div>
                          ))}
                        </div>
                        {selectedReceipt.notes&&<div style={{ background:T.bg, border:`1px solid ${T.border}`, borderRadius:8, padding:"10px 14px", marginBottom:16, fontSize:13, color:T.textSub, lineHeight:1.6 }}>{selectedReceipt.notes}</div>}
                        <div style={{ display:"flex", gap:8 }}>
                          <button onClick={()=>{ setReceiptEditForm({...selectedReceipt}); setEditingReceipt(true); }} style={{ flex:1, background:T.bg, color:T.text, border:`1px solid ${T.border}`, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1, textTransform:"uppercase", fontSize:12, padding:"9px", borderRadius:8, cursor:"pointer" }}>✏️ Edit</button>
                          <button onClick={()=>deleteReceipt(selectedReceipt.id)} style={{ padding:"9px 16px", background:"#06b6d422", color:"#06b6d4", border:"1px solid #06b6d444", fontFamily:"'Rajdhani',sans-serif", fontWeight:700, letterSpacing:1, textTransform:"uppercase", fontSize:12, borderRadius:8, cursor:"pointer" }}>🗑 Delete</button>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* Add Receipt modal */}
            {/* ── Header + Add button ── */}
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint }}>{receipts.length} receipts logged</div>
              <button onClick={()=>{ setReceiptForm(BLANK_RECEIPT); setReceiptScanFile(null); setReceiptScanErr(""); setShowReceiptForm(v=>!v); }} style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1.5, textTransform:"uppercase", color:"#fff", background:"#06b6d4", border:"none", borderRadius:8, padding:"7px 16px", cursor:"pointer" }}>{showReceiptForm ? "✕ Cancel" : "+ Add Receipt"}</button>
            </div>

            {/* ── Inline Add Receipt Card ── */}
            {showReceiptForm&&(
              <Card style={{ marginBottom:20, borderColor:"#06b6d444" }} className="fade-in">
                <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15, letterSpacing:2, textTransform:"uppercase", color:"#06b6d4", marginBottom:16 }}>New Expense Entry</div>

                {/* AI Scan Section */}
                <div style={{ background:T.bg, border:`1px dashed ${receiptScanning?"#06b6d4":T.border}`, borderRadius:10, padding:"14px 16px", marginBottom:20 }}>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1.5, textTransform:"uppercase", color:T.textFaint, marginBottom:10 }}>🤖 Scan Receipt Image</div>
                  <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                    <label style={{ flex:1, minWidth:160, display:"flex", alignItems:"center", gap:8, background:T.card, border:`1px solid ${T.border}`, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontSize:12, color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>
                      📎 {receiptScanFile ? receiptScanFile.name : "Choose image or PDF"}
                      <input type="file" accept="image/*,application/pdf" style={{ display:"none" }} onChange={e=>{ setReceiptScanFile(e.target.files[0]||null); setReceiptScanErr(""); }} />
                    </label>
                    <button onClick={()=>scanReceiptImage(receiptScanFile)} disabled={!receiptScanFile||receiptScanning}
                      style={{ flexShrink:0, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:12, letterSpacing:1.5, textTransform:"uppercase", padding:"8px 16px", borderRadius:8, border:"none", cursor: receiptScanFile&&!receiptScanning?"pointer":"default", background: receiptScanFile&&!receiptScanning?"#06b6d4":"#06b6d433", color: receiptScanFile&&!receiptScanning?"#fff":"#06b6d488" }}>
                      {receiptScanning ? "Scanning…" : "Extract ✨"}
                    </button>
                  </div>
                  {receiptScanErr && <div style={{ marginTop:8, fontSize:11, color:"#f87171" }}>{receiptScanErr}</div>}
                  {!receiptScanFile && <div style={{ marginTop:6, fontSize:10, color:T.textFaint }}>Upload a photo of your receipt to auto-fill the form below.</div>}
                </div>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }}>

                  {/* Per Diem checkbox */}
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={{ display:"flex", alignItems:"center", gap:10, background: receiptForm.perDiem ? "#06b6d411" : T.bg, border:`1px solid ${receiptForm.perDiem ? "#06b6d444" : T.border}`, borderRadius:8, padding:"10px 14px", cursor:"pointer", transition:"all 0.2s" }}>
                      <input type="checkbox" checked={!!receiptForm.perDiem} onChange={e => {
                        const checked = e.target.checked;
                        setReceiptForm(p => ({
                          ...p,
                          perDiem: checked,
                          category: checked ? "Food & Meals" : p.category,
                          amount:   checked ? "69.00" : (p.amount === "69.00" ? "" : p.amount),
                          vendor:   checked ? "Per Diem" : (p.vendor === "Per Diem" ? "" : p.vendor),
                          notes:    checked ? "IRS per diem allowance ($69/day)" : (p.notes === "IRS per diem allowance ($69/day)" ? "" : p.notes),
                        }));
                      }} style={{ width:16, height:16, accentColor:"#06b6d4", cursor:"pointer" }} />
                      <div>
                        <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:13, color: receiptForm.perDiem ? "#06b6d4" : T.text }}>Per Diem</div>
                        <div style={{ fontSize:10, color:T.textFaint, marginTop:1 }}>IRS trucker per diem — $69/day · auto-fills amount, category & notes</div>
                      </div>
                    </label>
                  </div>

                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={{ fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:T.textSub, display:"block", marginBottom:5, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>Category *</label>
                    <select value={receiptForm.category||""} onChange={e=>setReceiptForm(p=>({...p,category:e.target.value}))} style={{ background:T.input, border:`1px solid ${T.border}`, borderRadius:6, color: receiptForm.category ? T.text : T.textFaint, fontFamily:"'Rajdhani',sans-serif", fontSize:13, fontWeight:600, letterSpacing:1, padding:"9px 12px", width:"100%", outline:"none" }}>
                      <option value="">-- Select category --</option>
                      {EXPENSE_CATEGORIES.map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  {[["vendor","Vendor / Description *","text"],["date","Date *","date"],["amount","Amount ($) *","number"],["paymentMethod","Payment Method","text"],["loadNumber","Load # (optional)","text"]].map(([k,lbl,type])=>(
                    <Input key={k} label={lbl} type={type} value={receiptForm[k]||""} onChange={e=>setReceiptForm(p=>({...p,[k]:e.target.value}))} />
                  ))}
                  <div style={{ gridColumn:"1/-1" }}>
                    <label style={{ fontSize:10, letterSpacing:1.5, textTransform:"uppercase", color:T.textSub, display:"block", marginBottom:5, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>Notes</label>
                    <textarea value={receiptForm.notes||""} onChange={e=>setReceiptForm(p=>({...p,notes:e.target.value}))} rows={3} placeholder="Optional details..." style={{ width:"100%", background:T.input, border:`1px solid ${T.border}`, borderRadius:6, color:T.text, fontFamily:"'Rajdhani',sans-serif", fontSize:13, padding:"9px 12px", outline:"none", resize:"vertical", boxSizing:"border-box" }} />
                  </div>
                </div>

                <div style={{ display:"flex", gap:8 }}>
                  <Btn onClick={saveReceipt} disabled={!receiptForm.category||!receiptForm.vendor||!receiptForm.date||!receiptForm.amount}>Save Receipt</Btn>
                  <Btn variant="ghost" onClick={()=>setShowReceiptForm(false)}>Cancel</Btn>
                </div>
              </Card>
            )}

            {/* ── Summary stats ── */}
            {(()=>{
              const total = receipts.reduce((s,r)=>s+Number(r.amount||0),0);
              const byCategory = {};
              receipts.forEach(r=>{ byCategory[r.category]=(byCategory[r.category]||0)+Number(r.amount||0); });
              const topCat = Object.entries(byCategory).sort((a,b)=>b[1]-a[1])[0];
              return (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))", gap:12, marginBottom:20 }}>
                  {[
                    ["💸 Total Expenses", fmt$(total),               "#06b6d4"],
                    ["🧾 Receipt Count",  receipts.length,            "#a78bfa"],
                    ["📊 Avg per Receipt",receipts.length>0?fmt$(total/receipts.length):"$0", "#f59e0b"],
                    ["🏆 Top Category",   topCat?topCat[0]:"—",       "#34d399"],
                  ].map(([lbl,val,color])=>(
                    <div key={lbl} style={{ background:T.card, border:`1px solid ${T.border}`, borderRadius:12, padding:"14px 16px", textAlign:"center" }}>
                      <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:20, color, lineHeight:1.1 }}>{val}</div>
                      <div style={{ fontSize:9, color:T.textFaint, letterSpacing:1.5, textTransform:"uppercase", marginTop:5 }}>{lbl}</div>
                    </div>
                  ))}
                </div>
              );
            })()}

            {/* ── Category filter ── */}
            <div style={{ display:"flex", gap:8, overflowX:"auto", paddingBottom:6, marginBottom:16 }}>
              {["All", ...EXPENSE_CATEGORIES.filter(c=>receipts.some(r=>r.category===c))].map(cat=>(
                <button key={cat} onClick={()=>setReceiptFilter(cat)}
                  style={{ flexShrink:0, fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:1, textTransform:"uppercase", padding:"5px 14px", borderRadius:20, border:`1px solid ${receiptFilter===cat?"#06b6d4":T.border}`, background: receiptFilter===cat?"#06b6d422":T.card, color: receiptFilter===cat?"#06b6d4":T.textSub, cursor:"pointer" }}>
                  {cat}
                </button>
              ))}
            </div>

            {/* ── Spending by category bar chart ── */}
            {(()=>{
              const src = receiptFilter==="All" ? receipts : receipts.filter(r=>r.category===receiptFilter);
              const byCategory = {};
              src.forEach(r=>{ byCategory[r.category]=(byCategory[r.category]||0)+Number(r.amount||0); });
              const total = src.reduce((s,r)=>s+Number(r.amount||0),0);
              const cats = Object.entries(byCategory).sort((a,b)=>b[1]-a[1]);
              if (cats.length === 0) return null;
              const CAT_COLORS = ["#06b6d4","#a78bfa","#f59e0b","#34d399","#f43f5e","#fb923c","#60a5fa","#4ade80","#f87171","#e879f9"];
              return (
                <Card style={{ marginBottom:16 }}>
                  <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:11, letterSpacing:2, textTransform:"uppercase", color:T.textFaint, marginBottom:14 }}>Spending by Category</div>
                  {cats.map(([cat,amt],i)=>(
                    <div key={cat} style={{ marginBottom:10 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:4 }}>
                        <span style={{ color:T.textSub, fontFamily:"'Rajdhani',sans-serif", fontWeight:600 }}>{cat}</span>
                        <span style={{ color:CAT_COLORS[i%CAT_COLORS.length], fontFamily:"'Rajdhani',sans-serif", fontWeight:700 }}>{fmt$(amt)}</span>
                      </div>
                      <div style={{ height:6, background:T.bg, borderRadius:3, overflow:"hidden" }}>
                        <div style={{ height:"100%", width:`${total>0?(amt/total*100):0}%`, background:CAT_COLORS[i%CAT_COLORS.length], borderRadius:3, transition:"width 0.4s ease" }} />
                      </div>
                    </div>
                  ))}
                </Card>
              );
            })()}

            {/* ── Receipt list ── */}
            {(()=>{
              const filtered = receiptFilter==="All" ? receipts : receipts.filter(r=>r.category===receiptFilter);
              const sorted = [...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date));
              if (sorted.length === 0) return (
                <Card><div style={{ textAlign:"center", padding:"28px 0", color:T.textFaint, fontSize:13, fontFamily:"'Rajdhani',sans-serif" }}>No receipts in this category</div></Card>
              );
              return (
                <Card style={{ padding:0, overflow:"hidden" }}>
                  {sorted.map((r,idx)=>(
                    <div key={r.id} className="xrow" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8, padding:"14px 20px", borderBottom: idx<sorted.length-1?`1px solid ${T.divider}`:"none", cursor:"pointer" }}
                      onClick={()=>{ setSelectedReceipt(r); setEditingReceipt(false); }}>
                      <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
                        <div style={{ width:36, height:36, borderRadius:8, background:"#06b6d422", border:"1px solid #06b6d444", display:"flex", alignItems:"center", justifyContent:"center", fontSize:16, flexShrink:0 }}>🧾</div>
                        <div>
                          <div style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:14, color:T.textH }}>{r.vendor}</div>
                          <div style={{ fontSize:11, color:T.textSub, marginTop:2 }}>
                            <span style={{ color:"#06b6d4", fontWeight:600 }}>{r.category}</span>
                            {" · "}{r.date}
                            {r.loadNumber ? ` · 📦 ${r.loadNumber}` : ""}
                          </div>
                          {r.paymentMethod && <div style={{ fontSize:10, color:T.textFaint, marginTop:2 }}>💳 {r.paymentMethod}</div>}
                        </div>
                      </div>
                      <span style={{ fontFamily:"'Rajdhani',sans-serif", fontWeight:700, fontSize:15, color:"#06b6d4" }}>{fmt$(r.amount)}</span>
                    </div>
                  ))}
                </Card>
              );
            })()}
          </div>
        )}

      </div>
    </div>
    </ThemeCtx.Provider>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
