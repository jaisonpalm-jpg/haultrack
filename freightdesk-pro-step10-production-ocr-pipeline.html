function invoiceStatus(load){
  return load.invoiceStatus || load.payment || "Needs Invoice";

function invoiceAmount(load){
  const rate=Number(load.rate||0);
  const factoringPct=Number(load.factoringPct ?? 3);
  const quickPayPct=Number(load.quickPayPct ?? 0);
  const otherFees=Number(load.invoiceFees || 0);
  const deductions=rate*(factoringPct/100)+rate*(quickPayPct/100)+otherFees;
  return Math.max(0, rate-deductions);
}

  if(status==="Invoice Sent" && !load.invoiceDate) load.invoiceDate=new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"});
  if(status==="Paid" && !load.paidDate) load.paidDate=new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"});
  persistLoads();
  if(typeof saveLoadToFirestore==="function") saveLoadToFirestore(load).catch(console.warn);

function loadFuelCost(loadId){return (state.fuel||[]).filter(f=>String(f.load)===String(loadId)).reduce((s,f)=>s+Number(f.total||0),0)}
function loadExpenseCost(loadId){return (state.expenses||[]).filter(e=>String(e.load)===String(loadId)).reduce((s,e)=>s+Number(e.amount||0),0)}
function loadOperatingCost(loadId){return loadFuelCost(loadId)+loadExpenseCost(loadId)}
function loadProfitFull(load){
  const invoiceFees=Number(load.invoiceFees||0)+Number(load.rate||0)*(Number(load.factoringPct??3)/100)+Number(load.rate||0)*(Number(load.quickPayPct??0)/100);
  return Number(load.rate||0)-loadOperatingCost(load.id)-invoiceFees;
}

function getGroqKey(){return localStorage.getItem("fdp_groq_key")||""}
function setGroqKey(v){localStorage.setItem("fdp_groq_key",v||"");alert("Groq key saved locally in this browser.")}
function extractionPrompt(){
  return `Extract trucking rate confirmation fields from this document. Return ONLY valid JSON with:
{
 "loadNumber":"",
 "origin":"",
 "destination":"",
 "pickupDate":"",
 "deliveryDate":"",
 "rate":0,
 "miles":0,
 "broker":"",
 "commodity":"",
 "weight":"",
 "equipment":"",
 "stops":[],
 "confidence": {
   "loadNumber":0,
   "origin":0,
   "destination":0,
   "rate":0,
   "broker":0
 }
}`;
}
async function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(String(r.result).split(",")[1]);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}
async function extractWithGroq(file,doc){
  const key=getGroqKey();
  if(!key){alert("Add your Groq API key in Settings first.");return null}
  const base64=await fileToBase64(file);
  const mime=file.type||"image/jpeg";
  const body={
    model:"meta-llama/llama-4-scout-17b-16e-instruct",
    messages:[{
      role:"user",
      content:[
        {type:"text",text:extractionPrompt()},
        {type:"image_url",image_url:{url:`data:${mime};base64,${base64}`}}
      ]
    }],
    temperature:0
  };
  const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
    method:"POST",
    headers:{"Authorization":"Bearer "+key,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error("Groq extraction failed: "+res.status);
  const data=await res.json();
  const txt=data.choices?.[0]?.message?.content||"{}";
  const jsonText=txt.replace(/```json|```/g,"").trim();
  return JSON.parse(jsonText);
}
function fallbackExtractFromName(file){
  const name=file?.name||"";
  const active=currentLoad();
  const nums=name.match(/\d{4,}/g)||[];
  return {
    loadNumber:nums[0]||("FD-"+Date.now().toString().slice(-5)),
    origin:active.origin||"",
    destination:active.destination||"",
    pickupDate:"",
    deliveryDate:"",
    rate:Number(active.rate||0),
    miles:Number(active.miles||0),
    broker:active.broker||"",
    commodity:active.commodity||"General Freight",
    weight:"",
    equipment:"26 ft Box Truck",
    stops:[],
    confidence:{loadNumber:nums[0]?85:45,origin:50,destination:50,rate:50,broker:50}
  };
}
async function handleRateConExtraction(file,doc){
  if(!doc)return;
  doc.type="Rate Confirmation";
  await runProductionExtractionForFile(file,doc);
}
function confidenceClass(v){v=Number(v||0);return v>=80?"high":v>=55?"med":"low"}
function getConfidence(doc,key){return Number(doc?.extracted?.confidence?.[key]||0)}
function renderExtractionFields(d){
  const x=d.extracted||{};
  const fields=[
    ["loadNumber","Load #"],["origin","Origin"],["destination","Destination"],
    ["pickupDate","Pickup"],["deliveryDate","Delivery"],["rate","Rate"],
    ["miles","Miles"],["broker","Broker"],["commodity","Commodity"],
    ["weight","Weight"],["equipment","Equipment"]
  ];
  return `<div class="extract-panel">${fields.map(f=>`<div class="extract-field"><label class="form-label" style="margin:0">${f[1]}</label><input class="input" value="${x[f[0]]??""}" onchange="updateExtractField('${f[0]}',this.value)"><span class="conf ${confidenceClass(getConfidence(d,f[0]))}">${getConfidence(d,f[0])||"manual"}%</span></div>`).join("")}</div>`;
}
function validateExtraction(d){
  const x=d.extracted||{}, missing=[];
  ["loadNumber","origin","destination","rate"].forEach(k=>{if(!x[k])missing.push(k)});
  if(missing.length){alert("Missing required fields: "+missing.join(", "));return false}
  return true;
}
function createLoadFromValidatedDoc(){
  const d=selectedDoc();
  if(!d)return;
  const failed=validateExtractionRules(d.extracted||{}).some(c=>!c.pass&&c.severity==="fail");
  if(failed){alert("Fix required extraction fields before creating a load.");return}
  if(d.status!=="Approved" && !confirm("This extraction is not approved yet. Create load anyway?"))return;
  audit(d,"Load creation triggered from extraction.");
  createLoadFromSelectedDoc();
}

function getOcrSettings(){
  return {
    groqKey:localStorage.getItem("fdp_groq_key")||"",
    googleVisionKey:localStorage.getItem("fdp_google_vision_key")||"",
    textractMode:localStorage.getItem("fdp_textract_mode")||"manual",
    preferred:localStorage.getItem("fdp_ocr_provider")||"groq"
  };
}
function saveOcrSetting(k,v){localStorage.setItem(k,v||"");alert("OCR setting saved locally in this browser.")}
function audit(doc,msg,type="info"){
  doc.audit=doc.audit||[];
  doc.audit.unshift({time:new Date().toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}),msg,type});
}
function setPipeline(doc,stage,status="active"){
  doc.pipeline=doc.pipeline||{ocr:"pending",parse:"pending",validate:"pending",review:"pending"};
  doc.pipeline[stage]=status;
}
function pipelineHtml(doc){
  const p=doc.pipeline||{};
  const steps=[["ocr","OCR"],["parse","Parse"],["validate","Validate"],["review","Review"]];
  return `<div class="pipeline-steps">${steps.map(s=>`<div class="pipeline-step ${p[s[0]]||'pending'}"><b>${s[1]}</b><small>${(p[s[0]]||"pending").toUpperCase()}</small></div>`).join("")}</div>`;
}
function normalizeCityState(v){
  v=String(v||"").trim().replace(/\s+/g," ");
  return v.replace(/\b([A-Z]{2})\b$/,(m)=>m.toUpperCase());
}
function normalizeMoney(v){
  if(typeof v==="number")return v;
  return Number(String(v||"").replace(/[$,]/g,""))||0;
}
function normalizeExtraction(raw){
  raw=raw||{};
  const x={
    loadNumber:String(raw.loadNumber||raw.load_number||raw.load||"").trim(),
    origin:normalizeCityState(raw.origin||raw.pickup||raw.shipperLocation||""),
    destination:normalizeCityState(raw.destination||raw.delivery||raw.consigneeLocation||""),
    pickupDate:String(raw.pickupDate||raw.pickup_date||"").trim(),
    deliveryDate:String(raw.deliveryDate||raw.delivery_date||"").trim(),
    rate:normalizeMoney(raw.rate||raw.totalRate||raw.linehaul||0),
    miles:Number(raw.miles||raw.distance||0)||0,
    broker:String(raw.broker||raw.brokerName||raw.customer||"").trim(),
    commodity:String(raw.commodity||raw.freight||"General Freight").trim(),
    weight:String(raw.weight||"").trim(),
    equipment:String(raw.equipment||raw.truckType||"26 ft Box Truck").trim(),
    stops:Array.isArray(raw.stops)?raw.stops:[],
    rawText:raw.rawText||"",
    confidence:raw.confidence||{}
  };
  if(!x.loadNumber)x.loadNumber="FD-"+Date.now().toString().slice(-6);
  if(!x.miles && x.origin && x.destination)x.miles=0;
  return x;
}
function validateExtractionRules(x){
  const checks=[];
  function add(name,pass,msg,severity="warn"){checks.push({name,pass,msg,severity:pass?"pass":severity})}
  add("Load number",!!x.loadNumber,"Load number is required.","fail");
  add("Origin",!!x.origin,"Pickup origin is required.","fail");
  add("Destination",!!x.destination,"Delivery destination is required.","fail");
  add("Rate",Number(x.rate)>0,"Rate must be greater than $0.","fail");
  add("RPM sanity",!x.miles || Number(x.rate)/Math.max(1,Number(x.miles))>=0.75,"RPM looks unusually low.","warn");
  add("Broker",!!x.broker,"Broker is recommended for invoicing.","warn");
  add("Equipment",!!x.equipment,"Equipment type is recommended.","warn");
  return checks;
}
function validationHtml(doc){
  const x=doc.extracted||{};
  const checks=validateExtractionRules(x);
  return `<div class="validation-list">${checks.map(c=>`<div class="validation-item ${c.severity}"><b>${c.name}</b><small>${c.pass?"PASS":c.msg}</small></div>`).join("")}</div>`;
}
function extractionScore(doc){
  const x=doc.extracted||{}, checks=validateExtractionRules(x);
  const pass=checks.filter(c=>c.pass).length;
  const base=Math.round((pass/checks.length)*70);
  const conf=x.confidence||{};
  const confVals=Object.values(conf).map(Number).filter(Boolean);
  const avgConf=confVals.length?confVals.reduce((a,b)=>a+b,0)/confVals.length:50;
  return Math.min(100,Math.round(base+avgConf*.30));
}
async function runProductionExtractionForFile(file,doc){
  audit(doc,"Pipeline started.");
  setPipeline(doc,"ocr","active"); doc.status="OCR running"; renderDocs();
  let raw=null;
  try{
    const settings=getOcrSettings();
    if(settings.preferred==="groq" && settings.groqKey){
      audit(doc,"Running Groq Vision extraction.");
      raw=await extractWithGroq(file,doc);
    }else{
      audit(doc,"No live OCR provider configured. Using local fallback extraction.","warn");
      raw=fallbackExtractFromName(file);
    }
    setPipeline(doc,"ocr","done");
  }catch(e){
    audit(doc,"OCR provider failed. Falling back to local extraction.","warn");
    raw=fallbackExtractFromName(file);
    setPipeline(doc,"ocr","done");
  }

  setPipeline(doc,"parse","active"); doc.status="Parsing fields"; renderDocs();
  doc.extracted=normalizeExtraction(raw);
  audit(doc,"Fields normalized.");
  setPipeline(doc,"parse","done");

  setPipeline(doc,"validate","active"); doc.status="Validating";
  const checks=validateExtractionRules(doc.extracted);
  const hasFail=checks.some(c=>!c.pass&&c.severity==="fail");
  audit(doc, hasFail ? "Validation requires review." : "Validation passed.");
  setPipeline(doc,"validate",hasFail?"error":"done");

  setPipeline(doc,"review","active");
  doc.status=hasFail?"Review required":"Extraction ready";
  doc.score=extractionScore(doc);
  audit(doc,"Review packet ready. Score "+doc.score+"%.");
  saveDocToFirestore(doc).catch(console.warn);
  renderDocs();
}
function rerunExtraction(){
  const d=selectedDoc(); if(!d){alert("Select a document first.");return}
  d.pipeline={ocr:"done",parse:"done",validate:"active",review:"active"};
  d.extracted=normalizeExtraction(d.extracted||{});
  d.score=extractionScore(d);
  d.status=validateExtractionRules(d.extracted).some(c=>!c.pass&&c.severity==="fail")?"Review required":"Extraction ready";
  audit(d,"Manual re-validation complete.");
  saveDocToFirestore(d).catch(console.warn);
  renderDocs();
}
function approveExtraction(){
  const d=selectedDoc(); if(!d)return;
  if(validateExtractionRules(d.extracted||{}).some(c=>!c.pass&&c.severity==="fail")){
    alert("Fix required fields before approval.");
    return;
  }
  d.status="Approved";
  setPipeline(d,"review","done");
  audit(d,"Extraction approved.");
  saveDocToFirestore(d).catch(console.warn);
  renderDocs();
}
function auditHtml(doc){
  const rows=(doc.audit||[]).slice(0,12);
  return `<div class="audit-log">${rows.map(a=>`<div>${a.time} · ${a.msg}</div>`).join("")||"<div>No audit events yet.</div>"}</div>`;
}
