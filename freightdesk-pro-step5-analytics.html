try{if(window.firebase){firebase.initializeApp(firebaseConfig);db=firebase.firestore();auth=firebase.auth();storage=firebase.storage();db.enablePersistence({synchronizeTabs:true}).catch(()=>{});}}catch(e){console.warn("Firebase init failed",e)}

const $=id=>document.getElementById(id),money=n=>"$"+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0}),fmt=n=>Number(n||0).toLocaleString(),gross=()=>state.loads.reduce((s,l)=>s+Number(l.rate||0),0),fuelTotal=()=>state.fuel.reduce((s,f)=>s+Number(f.total||0),0),net=()=>gross()-fuelTotal(),currentLoad=()=>state.loads.find(l=>l.id===state.selectedLoadId)||state.loads[0]||seedLoads[0];

function loadDocRef(id){if(!db||!state.companyId)return null;return db.collection("companies").doc(state.companyId).collection("loads").doc(String(id))}
function normalizeLoadFromFirestore(doc){const d=doc.data()||{};return{id:d.id||doc.id,date:d.date||"",status:d.status||"Booked",origin:d.origin||"",destination:d.destination||"",rate:Number(d.rate||0),miles:Number(d.miles||0),driver:d.driver||d.assignedDriverName||"",broker:d.broker||"",commodity:d.commodity||"",payment:d.payment||d.paymentStatus||"Needs Invoice"}}

function normalizeDocFromFirestore(doc){const d=doc.data()||{};return{id:doc.id,name:d.name||"",type:d.type||"Document",status:d.status||"Uploaded",date:d.date||"",loadId:d.loadId||"",fileUrl:d.fileUrl||"",storagePath:d.storagePath||"",extracted:d.extracted||null}}

function subscribeDocs(){const col=docCollection();if(!col)return;if(docsUnsub)docsUnsub();docsUnsub=col.onSnapshot(snap=>{const rows=snap.docs.map(normalizeDocFromFirestore);if(rows.length){state.docs=rows;if(!state.selectedDocId)state.selectedDocId=rows[0]?.id||null;render()}else if(state.docs.length){state.docs.forEach(d=>saveDocToFirestore(d).catch(console.warn))}},err=>console.warn("Docs subscription failed",err))}
function classifyDocument(fileName){const n=(fileName||"").toLowerCase();if(n.includes("rate")||n.includes("rc")||n.includes("confirmation"))return"Rate Confirmation";if(n.includes("pod")||n.includes("delivery")||n.includes("bol"))return"POD";if(n.includes("invoice"))return"Invoice";if(n.includes("receipt")||n.includes("fuel"))return"Receipt";return"Document"}
function fakeExtractFromFile(file){const base=(file?.name||"").replace(/\.[^.]+$/,'');const active=currentLoad();return{loadNumber:base.match(/\d{4,}/)?.[0]||("FD-"+Date.now().toString().slice(-5)),origin:active.origin||"",destination:active.destination||"",rate:Number(active.rate||0),miles:Number(active.miles||0),broker:active.broker||"",commodity:active.commodity||"General Freight"}}
async function handleDocumentFiles(files){files=Array.from(files||[]);for(const file of files){const type=classifyDocument(file.name);const doc={id:"doc-"+Date.now()+"-"+Math.random().toString(16).slice(2),name:file.name,type,status:type==="Rate Confirmation"?"Ready for review":"Uploaded",date:new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"}),loadId:"",extracted:type==="Rate Confirmation"?fakeExtractFromFile(file):null};if(storage&&state.companyId){try{const path="companies/"+state.companyId+"/documents/"+doc.id+"-"+file.name;const ref=storage.ref(path);await ref.put(file);doc.storagePath=path;doc.fileUrl=await ref.getDownloadURL()}catch(e){console.warn("Storage upload failed; keeping local doc",e)}}state.docs.unshift(doc);state.selectedDocId=doc.id;saveDocToFirestore(doc).catch(console.warn)}renderDocs()}

function paymentClass(payment){if(payment==="Paid")return"green";if(payment==="Needs Invoice")return"amber";if(payment==="Awaiting Payment")return"red";return"blue"}
function invoiceStatus(load){
  return load.invoiceStatus || load.payment || "Needs Invoice";
}
function invoiceAmount(load){
  const rate=Number(load.rate||0);
  const factoringPct=Number(load.factoringPct ?? 3);
  const quickPayPct=Number(load.quickPayPct ?? 0);
  const otherFees=Number(load.invoiceFees || 0);
  const deductions=rate*(factoringPct/100)+rate*(quickPayPct/100)+otherFees;
  return Math.max(0, rate-deductions);
}
function setInvoiceStatus(id,status){
  const load=state.loads.find(l=>l.id===id);
  if(!load)return;
  load.invoiceStatus=status;
  load.payment=status;
  if(status==="Paid") load.status="Paid";
  if(status==="Invoice Sent" && !load.invoiceDate) load.invoiceDate=new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"});
  if(status==="Paid" && !load.paidDate) load.paidDate=new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"});
  persistLoads();
  if(typeof saveLoadToFirestore==="function") saveLoadToFirestore(load).catch(console.warn);
  render();
}
function createInvoicePacket(id){
  const load=state.loads.find(l=>l.id===id);
  if(!load)return;
  load.invoiceStatus="Invoice Sent";
  load.payment="Invoice Sent";
  load.invoiceNumber=load.invoiceNumber || ("INV-"+load.id);
  load.invoiceDate=new Date().toLocaleDateString("en-US",{month:"short",day:"2-digit"});

 let body='<div class="section-title"><small>Document Review</small><small>'+d.type+'</small></div><h3>'+d.name+'</h3><p class="muted">'+d.status+fileLink+'</p>';
 if(d.type==='Rate Confirmation'){
  [['loadNumber','Load #'],['origin','Origin'],['destination','Destination'],['rate','Rate'],['miles','Miles'],['broker','Broker'],['commodity','Commodity']].forEach(([key,label],i)=>{});
  body+='<div class="doc-preview">'+[['loadNumber','Load #'],['origin','Origin'],['destination','Destination'],['rate','Rate'],['miles','Miles'],['broker','Broker'],['commodity','Commodity']].map(([key,label])=>'<div class="doc-field"><span>'+label+'</span><input class="input" '+((key==='rate'||key==='miles')?'type="number"':'')+' value="'+(x[key]||'')+'" onchange="updateExtractField(\''+key+'\',this.value)"></div>').join('')+'</div><div class="form-actions"><button class="btn primary" onclick="createLoadFromSelectedDoc()">Create / Update Load</button><button class="btn" onclick="go(\'loads\')">View Loads</button></div>';
 }else if(d.type==='POD'){
  body+='<p class="muted">Attach this POD to its load and unblock invoicing.</p><div class="form-actions"><button class="btn primary" onclick="markPodReceived(\''+d.id+'\')">Mark POD Received</button><button class="btn" onclick="go(\'finance\')">Go to Invoice Pipeline</button></div>';
 }else body+='<p class="muted">Document uploaded and ready for review.</p>';
 return body;
}

function safeDiv(a,b){return b? a/b : 0}
function avg(arr,fn){return arr.length?arr.reduce((s,x)=>s+fn(x),0)/arr.length:0}
function loadProfit(load){
  const relatedFuel=(state.fuel||[]).filter(f=>String(f.load)===String(load.id)).reduce((s,f)=>s+Number(f.total||0),0);
  const fees=Number(load.invoiceFees||0)+Number(load.rate||0)*(Number(load.factoringPct??3)/100)+Number(load.rate||0)*(Number(load.quickPayPct??0)/100);
  return Number(load.rate||0)-relatedFuel-fees;
}
function loadRpm(load){return safeDiv(Number(load.rate||0),Number(load.miles||0))}
function docCompliance(load){
  const docs=state.docs||[];
  const hasPod=docs.some(d=>String(d.loadId||"").includes(String(load.id)) && (d.type==="POD" || String(d.name||"").toLowerCase().includes("pod")));
  const hasRate=docs.some(d=>String(d.loadId||"").includes(String(load.id)) && (d.type==="Rate Confirmation" || String(d.name||"").toLowerCase().includes("rate")));
  return (hasPod?50:0)+(hasRate?50:0);
}
function analyticsSummary(){
  const loads=state.loads||[];
  const delivered=loads.filter(l=>["Delivered","Paid"].includes(l.status));
  const paid=loads.filter(l=>invoiceStatus?invoiceStatus(l)==="Paid":l.payment==="Paid");
  const miles=loads.reduce((s,l)=>s+Number(l.miles||0),0);
  const grossRev=loads.reduce((s,l)=>s+Number(l.rate||0),0);
  const profit=loads.reduce((s,l)=>s+loadProfit(l),0);
  const rpm=safeDiv(grossRev,miles);
  const avgProfit=safeDiv(profit,loads.length);
  const onTime=loads.length?Math.round((delivered.length/loads.length)*100):0;
  const paidPct=loads.length?Math.round((paid.length/loads.length)*100):0;
  const docsAvg=Math.round(avg(loads,docCompliance));
  return {loads,delivered,paid,miles,grossRev,profit,rpm,avgProfit,onTime,paidPct,docsAvg};
}
function groupBy(arr,keyFn){
  return arr.reduce((m,x)=>{const k=keyFn(x)||"Unassigned";(m[k]=m[k]||[]).push(x);return m},{});
}
function driverReportCards(){
  const groups=groupBy(state.loads||[],l=>l.driver);
  return Object.entries(groups).map(([name,loads])=>{
    const gross=loads.reduce((s,l)=>s+Number(l.rate||0),0);
    const miles=loads.reduce((s,l)=>s+Number(l.miles||0),0);
    const rpm=safeDiv(gross,miles);
    const docs=Math.round(avg(loads,docCompliance));
    const paid=loads.filter(l=>(invoiceStatus?invoiceStatus(l):l.payment)==="Paid").length;
    const score=Math.round(Math.min(100,(rpm/2.5)*35 + docs*.30 + safeDiv(paid,loads.length)*35));
    return {name,loads:loads.length,gross,miles,rpm,docs,paid,score};
  }).sort((a,b)=>b.score-a.score);
}
function dispatcherReportCards(){
  const brokers=groupBy(state.loads||[],l=>l.broker);
  return Object.entries(brokers).map(([name,loads])=>{
    const gross=loads.reduce((s,l)=>s+Number(l.rate||0),0);
    const invoiceReady=loads.filter(l=>(invoiceStatus?invoiceStatus(l):l.payment)!=="Needs Invoice").length;
    const avgLoad=safeDiv(gross,loads.length);
    const docs=Math.round(avg(loads,docCompliance));
    const score=Math.round(Math.min(100,safeDiv(invoiceReady,loads.length)*40 + docs*.30 + Math.min(30,avgLoad/50)));
    return {name,loads:loads.length,gross,avgLoad,invoiceReady,docs,score};
  }).sort((a,b)=>b.score-a.score);
}
function lanePerformance(){
  return (state.loads||[]).map(l=>({lane:(l.origin||"").split(",")[0]+" → "+(l.destination||"").split(",")[0],gross:Number(l.rate||0),rpm:loadRpm(l),profit:loadProfit(l)})).sort((a,b)=>b.profit-a.profit);
}
function scoreCard(title,sub,score){
  const cls=score>=80?"green":score>=60?"amber":"red";
  return `<div class="score-card"><div><b>${title}</b><small>${sub}</small></div><div class="score-ring" style="--score:${score}"><span>${score}</span></div></div>`;
}
function barRow(label,value,max,display){
  const pct=Math.max(4,Math.min(100,safeDiv(value,max)*100));
  return `<div class="bar-row"><b>${label}</b><div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div><span class="muted" style="text-align:right">${display}</span></div>`;
}
function insightHtml(){
  const s=analyticsSummary();
  const items=[];
  if(s.rpm<2)items.push(["warn","RPM is below the target range. Review deadhead, lane selection, and broker mix."]);
  else items.push(["","RPM is healthy based on the current sample data."]);
  if(s.docsAvg<70)items.push(["bad","Document compliance is creating invoice risk. POD/rate con capture should be tightened."]);
  else items.push(["","Document compliance is acceptable for current loads."]);
  if(s.paidPct<50)items.push(["warn","A large share of money is still outside paid status. Prioritize invoice follow-up."]);
  else items.push(["","Payment conversion is moving in the right direction."]);
  return items.map(i=>`<div class="insight ${i[0]}"><b>${i[1]}</b></div>`).join("");
}
function renderAnalytics(){
const s=analyticsSummary();
const drivers=driverReportCards();
const dispatchers=dispatcherReportCards();
const lanes=lanePerformance();
const maxProfit=Math.max(1,...lanes.map(l=>l.profit));
$("mainPage").innerHTML=`<section class="grid">
  <div class="grid four">
    ${[
      ["Gross",money(s.grossRev),"Company total"],
      ["Net Profit",money(s.profit),"After fuel + fees"],
      ["Avg RPM","$"+s.rpm.toFixed(2),"Revenue per mile"],
      ["Doc Score",s.docsAvg+"%","Rate con + POD"]
    ].map(k=>`<div class="card kpi"><small>${k[0]}</small><strong>${k[1]}</strong><em>${k[2]}</em></div>`).join("")}
  </div>

  <div class="analytics-grid">
    <div class="card">
      <div class="section-title"><small>Lane Performance</small><small>Profit-ranked</small></div>
      ${lanes.map(l=>barRow(l.lane,l.profit,maxProfit,money(l.profit))).join("")}
    </div>
    <div class="card">
      <div class="section-title"><small>Insights</small><small>Execution Notes</small></div>
      ${insightHtml()}
    </div>
  </div>

  <div class="grid two">
    <div class="card">
      <div class="section-title"><small>Dispatcher / Broker Report Card</small><small>Invoice readiness</small></div>
      <div class="list">
        ${dispatchers.map(d=>`<div class="item"><div><b>${d.name}</b><small>${d.loads} loads · ${money(d.gross)} gross · ${d.docs}% docs</small></div><span class="chip ${d.score>=80?'green':d.score>=60?'amber':'red'}">${d.score}</span></div>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="section-title"><small>Driver Report Card</small><small>RPM + docs + paid</small></div>
      <div class="list">
        ${drivers.map(d=>`<div class="item"><div><b>${d.name}</b><small>${d.loads} loads · $${d.rpm.toFixed(2)} RPM · ${d.docs}% docs</small></div><span class="chip ${d.score>=80?'green':d.score>=60?'amber':'red'}">${d.score}</span></div>`).join("")}
      </div>
    </div>
  </div>

  <div class="grid three">
    <div class="card">
      <div class="section-title"><small>Operational Score</small><small>Delivery</small></div>
      ${scoreCard("Delivered / Paid Ratio",s.delivered.length+" of "+s.loads.length+" completed",s.onTime)}
    </div>
    <div class="card">
      <div class="section-title"><small>Cash Score</small><small>Payment</small></div>
      ${scoreCard("Paid Conversion",s.paid.length+" paid loads",s.paidPct)}
    </div>
    <div class="card">
      <div class="section-title"><small>Document Score</small><small>Compliance</small></div>
      ${scoreCard("Paperwork Ready",s.docsAvg+"% average",s.docsAvg)}
    </div>
  </div>
</section>`;
}function renderSettings(){$("mainPage").innerHTML=`<section class="grid two"><div class="card"><div class="section-title"><small>Settings</small><small>Company</small></div><label class="muted">Company Name</label><input class="input" value="Speedy Sparrow Logistics LLC"><br><br><label class="muted">Default Factoring Fee</label><input class="input" value="3%"></div><div class="card"><div class="section-title"><small>Appearance</small><small>Theme</small></div><p class="muted">Operator-style design system is active. Use the theme toggle to preview dark mode.</p><button class="btn primary" onclick="toggleTheme()">Toggle Theme</button></div></section>`}

function setCompanyId(id){id=(id||"").trim()||"co_demo_freightdesk_pro";state.companyId=id;localStorage.setItem("fdp_company_id",id);subscribeLoads();render()}
function toggleTheme(){document.body.dataset.theme=document.body.dataset.theme==="dark"?"light":"dark"}init();bootstrapFirebase();
</script>
